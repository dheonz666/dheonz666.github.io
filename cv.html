<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder & 10 Tema CV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Montserrat', sans-serif;
            --bg-page: #e2e8f0;
            --bg-cv: #ffffff;
            --bg-sidebar: #1e293b;
            --text-sidebar: #ffffff;
            --bg-main: #ffffff;
            --text-main: #1f2937;
            --accent-color: #64748b;
            --layout-dir: row;
            --sidebar-width: 35%;
        }

        body {
            background-color: var(--bg-page);
            font-family: var(--font-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* --- THEME DEFINITIONS (1-10) --- */
        [data-theme="1"] { --bg-sidebar: #263252; --text-sidebar: #ffffff; --accent-color: #4b5d84; --text-main: #333333; }
        [data-theme="1"] .cv-sidebar { border-radius: 0 40px 0 0; }
        [data-theme="1"] .section-title-sidebar { background: #576b95; color: white; border-radius: 20px; }

        [data-theme="2"] { --bg-sidebar: #ffffff; --text-sidebar: #0f766e; --bg-main: #ffffff; --accent-color: #0f766e; }
        [data-theme="2"] .cv-sidebar { border-left: 15px solid #0f766e; padding-left: 1.5rem; }
        [data-theme="2"] .section-title-sidebar { background: #0f766e; color: white; border-radius: 0; }
        [data-theme="2"] .section-title-main { background: transparent; color: #0f766e; border-bottom: 2px solid #0f766e; padding-left: 0; }

        [data-theme="3"] { --bg-sidebar: #0ea5e9; --text-sidebar: #ffffff; --accent-color: #0284c7; }
        [data-theme="3"] .icon-svg { display: inline-block; width: 16px; height: 16px; margin-right: 8px; fill: currentColor; }

        [data-theme="4"] { --bg-cv: #f3f4f6; --bg-sidebar: #ffffff; --text-sidebar: #1f2937; --bg-main: #ffffff; --text-main: #374151; --accent-color: #8b5cf6; --font-heading: 'Poppins', sans-serif; }
        [data-theme="4"] .cv-wrapper { background-color: #f3f4f6; }
        [data-theme="4"] .cv-layout { padding: 1.5rem; gap: 1.5rem; background-color: #f3f4f6; }
        [data-theme="4"] .cv-sidebar { border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08); padding: 2.5rem 1.5rem; border: 1px solid #e5e7eb; }
        [data-theme="4"] .cv-main { border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08); padding: 2.5rem; border: 1px solid #e5e7eb; }
        [data-theme="4"] .profile-img-container { border: 4px solid #ede9fe; border-radius: 2rem; width: 130px; height: 130px; }
        [data-theme="4"] .section-title-sidebar, [data-theme="4"] .section-title-main { background: #ede9fe; color: #5b21b6; border-radius: 0.5rem; border: none; text-align: center; font-weight: 700; }
        [data-theme="4"] .timeline-item::before { background-color: #8b5cf6; border-radius: 0.25rem; }

        [data-theme="5"] { --bg-sidebar: #ffffff; --text-sidebar: #334155; --bg-main: #ffffff; --accent-color: #3b82f6; }
        [data-theme="5"] .top-banner-bg { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 160px; background: linear-gradient(90deg, #1e3a8a, #3b82f6); z-index: 0; }
        [data-theme="5"] .cv-layout { position: relative; z-index: 1; padding-top: 90px; }
        [data-theme="5"] .cv-sidebar { background: transparent; padding-top: 0; }
        [data-theme="5"] .profile-img-container { width: 150px; height: 150px; border: 5px solid white; margin-left: auto; margin-right: auto; margin-bottom: 1rem; }
        [data-theme="5"] .sidebar-name-area h1 { color: #1e3a8a; }
        [data-theme="5"] .sidebar-name-area h2 { color: #64748b; }
        [data-theme="5"] .sosmed-icons { display: flex; }
        [data-theme="5"] .cv-main { padding-top: 4rem; }
        [data-theme="5"] .section-title-sidebar, [data-theme="5"] .section-title-main { background: #f1f5f9; color: #1e3a8a; border-radius: 8px; text-align: left; padding: 0.5rem 1rem; border-left: 4px solid #3b82f6; }

        [data-theme="6"] { --bg-cv: #fff5f5; --text-main: #831843; --accent-color: #f43f5e; --font-heading: 'Playfair Display', serif; }
        [data-theme="6"] .cv-wrapper { background-image: radial-gradient(circle at top left, #fce7f3 0%, transparent 40%), radial-gradient(circle at bottom right, #fbcfe8 0%, transparent 40%); }
        [data-theme="6"] .cv-sidebar { background: rgba(255, 255, 255, 0.6); color: #831843; border-right: 1px dashed #f9a8d4; }
        [data-theme="6"] .section-title-sidebar, [data-theme="6"] .section-title-main { background: transparent; color: #be123c; border-bottom: 2px solid #fbcfe8; border-radius: 0; text-align: left; padding-left: 0; }
        [data-theme="6"] .profile-img-container { border: 4px solid #fbcfe8; }

        [data-theme="7"] { --bg-sidebar: #121212; --text-sidebar: #e5e5e5; --bg-main: #f8f9fa; --accent-color: #d4af37; --sidebar-width: 45%; }
        [data-theme="7"] .section-title-sidebar { background: #d4af37; color: #000; border-radius: 0; }
        [data-theme="7"] .section-title-main { background: #121212; color: #d4af37; border-radius: 0; }
        [data-theme="7"] .profile-img-container { border-color: #d4af37; }

        [data-theme="8"] { --bg-sidebar: #0f172a; --text-sidebar: #f8fafc; --bg-main: #f8fafc; --accent-color: #2563eb; }
        [data-theme="8"] .top-banner-bg { display: block; position: absolute; top: 0; right: 0; width: 65%; height: 140px; background: #2563eb; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 20%); z-index: 0; }
        [data-theme="8"] .bottom-banner-bg { display: block; position: absolute; bottom: 0; right: 0; width: 65%; height: 120px; background: #2563eb; clip-path: polygon(0 80%, 100% 0, 100% 100%, 0 100%); z-index: 0; }
        [data-theme="8"] .cv-sidebar { background: var(--bg-sidebar); position: relative; z-index: 2; }
        [data-theme="8"] .cv-main { position: relative; z-index: 1; padding-top: 4rem; }
        [data-theme="8"] .profile-img-container { width: 140px; height: 140px; border-radius: 0; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); border: none; }
        [data-theme="8"] .section-title-sidebar { background: rgba(255,255,255,0.1); border-left: 4px solid #3b82f6; border-radius: 0; text-align: left; }
        [data-theme="8"] .section-title-main { background: #2563eb; color: white; display: inline-block; padding: 0.5rem 1.5rem; clip-path: polygon(10% 0, 100% 0%, 90% 100%, 0% 100%); border-radius: 0; }
        [data-theme="8"] .timeline-item::before { border-radius: 0; transform: rotate(45deg); background: #2563eb; }

        [data-theme="9"] { --bg-sidebar: #3f6212; --text-sidebar: #ecfccb; --bg-main: #fefce8; --text-main: #3f6212; --accent-color: #65a30d; }
        [data-theme="9"] .cv-sidebar { border-radius: 0 0 60px 0; }
        [data-theme="9"] .section-title-sidebar, [data-theme="9"] .section-title-main { border-radius: 20px; text-align: center; }

        [data-theme="10"] { --font-main: 'Inter', sans-serif; --font-heading: 'Playfair Display', serif; --bg-cv: #1a1518; --text-main: #fdfbf7; --layout-dir: column; }
        [data-theme="10"] .cv-layout { flex-direction: column; padding: 2rem; position: relative; }
        [data-theme="10"] .cv-sidebar, [data-theme="10"] .cv-main { width: 100%; background: transparent; color: #fdfbf7; padding: 0; }
        [data-theme="10"] .magazine-header { display: block; text-align: center; margin-bottom: 1rem; position: relative; z-index: 2; }
        [data-theme="10"] .magazine-header h1 { font-size: 4.5rem; font-weight: 900; letter-spacing: 2px; line-height: 1; color: #ffffff; }
        [data-theme="10"] .magazine-header h2 { font-size: 1.5rem; letter-spacing: 5px; color: #9ca3af; margin-top: 0.5rem; }
        [data-theme="10"] .sidebar-name-area { display: none; }
        [data-theme="10"] .profile-img-container { width: 100%; height: 450px; border-radius: 0; border: none; margin-bottom: 2rem; position: relative; z-index: 1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        [data-theme="10"] .profile-img-container img { object-position: top; }
        [data-theme="10"] .content-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        [data-theme="10"] .section-title-sidebar, [data-theme="10"] .section-title-main { background: transparent; color: #fca5a5; border-bottom: 1px solid #4b3240; text-align: left; padding-left: 0; font-size: 1.5rem; }
        [data-theme="10"] .timeline-item::before { background-color: #fca5a5; }
        [data-theme="10"] .timeline-item::after { background-color: #fca5a5; }

        /* Base Layout Rules */
        .cv-wrapper {
            background-color: var(--bg-cv);
            width: 210mm; /* A4 Width */
            min-height: 297mm; /* A4 Height */
            margin: 0 auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
    
        .top-banner-bg { display: none; }
        .bottom-banner-bg { display: none; }
        .magazine-header { display: none; }
    
        .cv-layout {
            display: flex;
            flex-direction: var(--layout-dir);
            flex: 1;
            width: 100%;
        }

        .cv-sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            color: var(--text-sidebar);
            padding: 2.5rem 2rem;
            z-index: 2;
        }

        .cv-main {
            flex: 1;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 3rem;
            z-index: 2;
        }

        .profile-img-container {
            width: 10rem;
            height: 10rem;
            border-radius: 9999px;
            border: 4px solid white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            transition: all 0.3s ease;
        }

        .section-title-sidebar {
            background-color: var(--accent-color);
            color: var(--text-sidebar);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-align: center;
            font-family: var(--font-heading);
            font-weight: bold;
            margin-bottom: 1rem;
            margin-top: 2rem;
        }

        .section-title-main {
            background-color: var(--accent-color);
            color: white;
            padding: 0.5rem 1rem;
            font-family: var(--font-heading);
            font-weight: bold;
            margin-bottom: 1.5rem;
            border-radius: 0.25rem;
        }

        .timeline-item {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.3rem;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent-color);
        }
        .timeline-item::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 0.8rem;
            width: 2px;
            height: calc(100% + 1rem);
            background-color: var(--accent-color);
            opacity: 0.5;
        }
        .timeline-item:last-child::after { display: none; }

        h1, h2, h3 { font-family: var(--font-heading); }
        .icon-svg { display: none; } /* Hidden by default, shown in T3 */
        .sosmed-icons { display: none; } /* Hidden by default, shown in T5 */

        /* Navigation Bar */
        .nav-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }

        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .cv-wrapper { box-shadow: none; width: 100%; height: auto; min-height: 100%; margin: 0; border: none; }
            [data-theme="4"] .cv-wrapper { background-color: #f3f4f6 !important; }
            [data-theme="4"] .cv-sidebar, [data-theme="4"] .cv-main { border: 1px solid #d1d5db !important; }
            @page { size: A4; margin: 0; }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100" data-theme="1" id="body-theme">

    <!-- Top Navigation Bar -->
    <div class="no-print bg-white border-b sticky top-0 z-[100] shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold text-gray-800 py-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
                CV Builder Pro
            </h1>
            <div class="flex space-x-6 h-full">
                <button onclick="switchView('admin')" id="nav-admin" class="py-4 px-2 nav-active transition-colors hover:text-blue-600">Setting</button>
                <button onclick="switchView('preview')" id="nav-preview" class="py-4 px-2 text-gray-500 transition-colors hover:text-blue-600">Preview CV</button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="max-w-5xl mx-auto py-8 px-4" id="main-container">

        <!-- ==================== ADMIN DASHBOARD VIEW ==================== -->
        <div id="admin-view" class="space-y-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Informasi Utama</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                        <input type="text" id="input-name" class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Profesi / Judul</label>
                        <input type="text" id="input-profession" class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nomor HP</label>
                        <input type="text" id="input-phone" class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="text" id="input-email" class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Alamat</label>
                        <textarea id="input-address" rows="2" class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">URL Foto Profil</label>
                        <input type="text" id="input-image" class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Profil Profesional (Tentang Saya)</h2>
                <textarea id="input-profile" rows="5" class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-lg font-bold text-gray-800">Riwayat Pendidikan</h2>
                    <button onclick="addEducation()" class="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200">+ Tambah</button>
                </div>
                <div id="education-list" class="space-y-3">
                    <!-- Dinamis terisi dari JS -->
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-lg font-bold text-gray-800">Pengalaman Kerja</h2>
                    <button onclick="addExperience()" class="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200">+ Tambah</button>
                </div>
                <div id="experience-list" class="space-y-4">
                    <!-- Dinamis terisi dari JS -->
                </div>
            </div>

            <div class="flex justify-end gap-4 mt-6">
                <button onclick="saveAndPreview()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition">
                    Simpan & Lihat Preview CV
                </button>
            </div>

        </div>

        <!-- ==================== PREVIEW CV VIEW ==================== -->
        <div id="preview-view" class="hidden">
            
            <!-- Control Panel -->
            <div class="no-print w-full mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex-1 w-full">
                        <h2 class="text-xl font-bold text-gray-800 mb-2">Pilih Tema Visual CV</h2>
                        <div class="w-full md:w-80">
                            <select id="themeSelector" onchange="setTheme(parseInt(this.value))" class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 text-gray-700 font-medium cursor-pointer">
                                <option value="1">1. Profesional Klasik (Pill)</option>
                                <option value="2">2. Kreatif Minimalis (Garis)</option>
                                <option value="3">3. Infografis & Visual (Ikon)</option>
                                <option value="4">4. Kartu Modern (Violet Floating)</option>
                                <option value="5">5. Pusat Media Sosial (Kurva)</option>
                                <option value="6">6. Ilustratif & Artistik</option>
                                <option value="7">7. Split-Screen Kontras Tinggi</option>
                                <option value="8">8. Geometris & Modern</option>
                                <option value="9">9. Organik Bumi</option>
                                <option value="10">10. Gaya Majalah (Vogue/Cover)</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition transform hover:scale-105 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                            Cetak PDF
                        </button>
                        <p class="text-xs text-gray-500 text-center">Margin: None | Aktifkan Background</p>
                    </div>
                </div>
            </div>

            <!-- CV Document Output -->
            <div class="cv-wrapper" id="cv-document">
                <div class="top-banner-bg"></div>
                <div class="bottom-banner-bg"></div>

                <div class="cv-layout">
                    
                    <div class="magazine-header">
                        <h1 class="cv-dyn-name-upper">NAMA</h1>
                        <h2 class="cv-dyn-profession">PROFESI</h2>
                    </div>

                    <!-- Sidebar -->
                    <div class="cv-sidebar flex flex-col">
                        <div class="profile-img-container">
                            <img src="" alt="Foto Profil" class="cv-dyn-image w-full h-full object-cover">
                        </div>

                        <div class="text-center mb-6 sidebar-name-area">
                            <!-- Dynamic Name injects <br> here for layout -->
                            <h1 class="text-3xl font-bold tracking-wide uppercase mb-1 cv-dyn-name-break">Nama<br>Anda</h1>
                            <h2 class="text-lg tracking-wider uppercase opacity-90 cv-dyn-profession" style="font-family: var(--font-main);">Profesi</h2>
                            
                            <div class="sosmed-icons mt-4 justify-center gap-3">
                                <a href="#" class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-700 transition">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                </a>
                                <a href="#" class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center hover:bg-sky-600 transition">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>

                                <a href="#" class="w-8 h-8 rounded-full bg-blue-800 text-white flex items-center justify-center hover:bg-blue-900 transition">
                                     <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>

                        <div class="content-columns-wrapper w-full">
                            <div class="sidebar-content-block">

                                        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 10.999h2C22 5.869 18.127 2 12.99 2v2C17.052 4 20 6.943 20 10.999z"/><path d="M13 8c2.103 0 3 .897 3 3h2c0-3.225-1.775-5-5-5v2zm3.422 5.443a1.001 1.001 0 0 0-1.391.043l-2.393 2.461c-.576-.11-1.734-.471-2.926-1.66-1.192-1.193-1.553-2.354-1.66-2.926l2.459-2.394a1 1 0 0 0 .043-1.391L6.859 3.513a1 1 0 0 0-1.391-.087l-2.17 1.861a1 1 0 0 0-.29.649c-.015.25-.301 6.172 4.291 10.766C11.305 20.707 16.323 21 17.705 21c.202 0 .326-.006.359-.008a.992.992 0 0 0 .648-.291l1.86-2.171a1 1 0 0 0-.086-1.391l-4.064-3.696z"/></svg>

                                        <div>
                                            <p class="font-bold mb-1">Address</p>
                                            <p class="leading-relaxed cv-dyn-address">-</p>

                            <div class="sidebar-content-block mt-6">
                                <h3 class="section-title-sidebar uppercase tracking-wider">Education</h3>
                                <div class="flex items-start mt-4">
                                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2L1 7l11 5 9-4.09V17h2V7l-11-5z"/><path d="M4 11v4.333C4 17.9 7.582 20 12 20s8-2.1 8-4.667V11l-8 3.636L4 11z"/></svg>

                    <!-- Main Content -->
                    <div class="cv-main">
                        <div class="content-columns">
                            <div class="mb-8 content-left">
                                <h3 class="section-title-main text-xl uppercase tracking-wider">Profil Profesional</h3>
                                <p class="leading-relaxed text-justify mt-4 cv-dyn-profile">
                                    -
                                </p>
                            </div>

                            <div class="content-right">
                                <h3 class="section-title-main text-xl uppercase tracking-wider">Pengalaman (Experience)</h3>
                                <div class="mt-6 cv-dyn-experience">
                                    <!-- Exp list inject -->
                                </div>

    </div>

    <script>
        // --- 1. STATE MANAGEMENT ---
        let cvData = {
            name: "Ami Fitriyanti",
            profession: "Perawat",
            phone: "+62 878-7993-2221",
            email: "dityaameliaputri3@gmail.com",
            address: "Kp awi mekar Rt 012/006 Kec. Bungursari\nDesa bungursari Kab. Purwakarta",
            profile: "Saya adalah seorang perawat profesional yang berdedikasi dan berpengalaman bekerja di RSU Hospital Radjak. Dengan latar belakang pendidikan keperawatan dan pengalaman kerja lebih dari 14 tahun, saya memiliki keterampilan klinis yang kuat serta kemampuan komunikasi yang baik dalam memberikan pelayanan kesehatan yang holistik dan empatik kepada pasien. Saya terbiasa bekerja dalam tim multidisiplin, serta selalu mengutamakan keselamatan dan kenyamanan pasien. Komitmen saya adalah untuk terus belajar dan berkembang demi meningkatkan mutu pelayanan kesehatan.",
            image: "https://raw.githubusercontent.com/dheonz666/dheonz666.github.io/refs/heads/main/assets/img/ami2.jpg",
            education: [
                "D3 Kep di Akper Efarina Etaham",
                "S1 Stikes Cirebon",
                "Profesi Stikes Cirebon"
            ],
            experience: [
                { period: "2011 - 2013", title: "Perawat Rawat Inap" },
                { period: "2013 - 2015", title: "Penanggung Jawab Nicu" },
                { period: "2015 - 2020", title: "Kepala Ruang Rawat Inap Anak" },
                { period: "2020 - Sekarang", title: "Kepala Ruang Nicu/Picu/Perinatologi" }
            ]
        };

        // --- 2. VIEW TOGGLER ---
        function switchView(view) {
            const adminView = document.getElementById('admin-view');
            const previewView = document.getElementById('preview-view');
            const navAdmin = document.getElementById('nav-admin');
            const navPreview = document.getElementById('nav-preview');
            const container = document.getElementById('main-container');

            if (view === 'admin') {
                adminView.classList.remove('hidden');
                previewView.classList.add('hidden');
                navAdmin.classList.add('nav-active', 'text-blue-600');
                navAdmin.classList.remove('text-gray-500');
                navPreview.classList.remove('nav-active', 'text-blue-600');
                navPreview.classList.add('text-gray-500');
                container.classList.remove('max-w-none');
                container.classList.add('max-w-5xl');
                
                populateAdminForm();
            } else {
                adminView.classList.add('hidden');
                previewView.classList.remove('hidden');
                navPreview.classList.add('nav-active', 'text-blue-600');
                navPreview.classList.remove('text-gray-500');
                navAdmin.classList.remove('nav-active', 'text-blue-600');
                navAdmin.classList.add('text-gray-500');
                container.classList.add('max-w-none');
                container.classList.remove('max-w-5xl');
                
                renderCV();
            }
        }

        // --- 3. ADMIN FORM LOGIC ---
        function populateAdminForm() {
            document.getElementById('input-name').value = cvData.name;
            document.getElementById('input-profession').value = cvData.profession;
            document.getElementById('input-phone').value = cvData.phone;
            document.getElementById('input-email').value = cvData.email;
            document.getElementById('input-address').value = cvData.address;
            document.getElementById('input-image').value = cvData.image;
            document.getElementById('input-profile').value = cvData.profile;

            renderEducationAdmin();
            renderExperienceAdmin();
        }

        function renderEducationAdmin() {
            const list = document.getElementById('education-list');
            list.innerHTML = '';
            cvData.education.forEach((edu, index) => {
                list.innerHTML += `
                    <div class="flex gap-2">
                        <input type="text" value="${edu}" onchange="cvData.education[${index}] = this.value" class="flex-1 p-2 border border-gray-300 rounded focus:ring-blue-500">
                        <button onclick="removeEducation(${index})" class="bg-red-100 text-red-600 px-3 py-2 rounded hover:bg-red-200">Hapus</button>
                    </div>
                `;
            });
        }

        function addEducation() {
            cvData.education.push("Sekolah / Universitas Baru");
            renderEducationAdmin();
        }

        function removeEducation(index) {
            cvData.education.splice(index, 1);
            renderEducationAdmin();
        }

        function renderExperienceAdmin() {
            const list = document.getElementById('experience-list');
            list.innerHTML = '';
            cvData.experience.forEach((exp, index) => {
                list.innerHTML += `
                    <div class="flex flex-col md:flex-row gap-2 border p-3 rounded bg-gray-50">
                        <input type="text" placeholder="Tahun (cth: 2020-2022)" value="${exp.period}" onchange="cvData.experience[${index}].period = this.value" class="md:w-1/3 p-2 border border-gray-300 rounded focus:ring-blue-500">
                        <input type="text" placeholder="Jabatan / Posisi" value="${exp.title}" onchange="cvData.experience[${index}].title = this.value" class="flex-1 p-2 border border-gray-300 rounded focus:ring-blue-500">
                        <button onclick="removeExperience(${index})" class="bg-red-100 text-red-600 px-3 py-2 rounded hover:bg-red-200">Hapus</button>
                    </div>
                `;
            });
        }

        function addExperience() {
            cvData.experience.push({ period: "Tahun", title: "Posisi Baru" });
            renderExperienceAdmin();
        }

        function removeExperience(index) {
            cvData.experience.splice(index, 1);
            renderExperienceAdmin();
        }

        function saveAndPreview() {
            // Grab simple inputs
            cvData.name = document.getElementById('input-name').value;
            cvData.profession = document.getElementById('input-profession').value;
            cvData.phone = document.getElementById('input-phone').value;
            cvData.email = document.getElementById('input-email').value;
            cvData.address = document.getElementById('input-address').value;
            cvData.image = document.getElementById('input-image').value;
            cvData.profile = document.getElementById('input-profile').value;
            
            // Switch to preview mode (which automatically calls renderCV)
            switchView('preview');
        }


        // --- 4. RENDER CV LOGIC ---
        function renderCV() {
            // Text Replacements
            document.querySelector('.cv-dyn-name-upper').textContent = cvData.name.toUpperCase();
            
            // For the sidebar name, replace first space with <br> for styling purposes if exists
            let nameBreak = cvData.name;
            if(nameBreak.indexOf(' ') > -1) {
                nameBreak = nameBreak.replace(' ', '<br>');
            }
            document.querySelector('.cv-dyn-name-break').innerHTML = nameBreak;

            document.querySelectorAll('.cv-dyn-profession').forEach(el => el.textContent = cvData.profession);
            document.querySelector('.cv-dyn-phone').textContent = cvData.phone;
            document.querySelector('.cv-dyn-email').textContent = cvData.email;
            document.querySelector('.cv-dyn-address').innerHTML = cvData.address.replace(/\n/g, '<br>');
            document.querySelector('.cv-dyn-profile').textContent = cvData.profile;
            document.querySelector('.cv-dyn-image').src = cvData.image;

            // Render Education Lists
            const eduContainer = document.querySelector('.cv-dyn-education');
            eduContainer.innerHTML = '';
            cvData.education.forEach(edu => {
                let li = document.createElement('li');
                li.textContent = edu;
                eduContainer.appendChild(li);
            });

            // Render Experience Lists
            const expContainer = document.querySelector('.cv-dyn-experience');
            expContainer.innerHTML = '';
            cvData.experience.forEach(exp => {
                let div = document.createElement('div');
                div.className = 'timeline-item';
                div.innerHTML = `
                    <span class="font-bold text-sm block mb-1 opacity-80">${exp.period}</span>
                    <span class="text-lg font-medium">${exp.title}</span>
                `;
                expContainer.appendChild(div);
            });
        }

        // --- 5. THEME LOGIC (EXISTING) ---
        function setTheme(themeNumber) {
            const body = document.getElementById('body-theme');
            body.setAttribute('data-theme', themeNumber);
            
            const contentColumns = document.querySelector('.content-columns');
            const sidebarContentWrapper = document.querySelector('.content-columns-wrapper');
            const contactBlock = document.querySelector('.sidebar-content-block');
            const eduBlock = document.querySelectorAll('.sidebar-content-block')[1];
            
            if (themeNumber === 10) {
                contentColumns.appendChild(contactBlock);
                contentColumns.appendChild(eduBlock);
            } else {
                sidebarContentWrapper.appendChild(contactBlock);
                sidebarContentWrapper.appendChild(eduBlock);
            }
        }

        // --- 6. INITIALIZATION --- 
        window.onload = () => {
            // Load admin forms data on start
            populateAdminForm();
            
            // Set initial theme
            document.getElementById('themeSelector').value = '1';
            setTheme(1);
        }
    </script>
</body>
