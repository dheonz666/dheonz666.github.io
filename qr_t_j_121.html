<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak QR Code T&J 121 (Canvas Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Area Canvas untuk Print */
        .a4-canvas {
            width: 210mm !important;
            height: 297mm !important;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            margin: 0 auto 20px auto;
            display: block;
        }

        /* Pengaturan Cetak (Print) Absolut */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0; /* Menghilangkan margin bawaan browser */
            }
            body { 
                background-color: white; 
                margin: 0;
                padding: 0;
            }
            .no-print { 
                display: none !important; 
            }
            #preview-container {
                padding: 0 !important;
                background: none !important;
            }
            .a4-canvas {
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always; /* Memastikan canvas berganti halaman */
                width: 210mm !important;
                height: 297mm !important;
            }
        }
    </style>
</head>
<body class="bg-gray-200 min-h-screen font-sans">

    <header class="bg-white border-b border-gray-200 p-4 md:p-6 shadow-sm z-10 no-print pb-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Cetak QR Code T&J 121 (Resolusi Tinggi)</h1>
                    <p class="text-sm text-gray-500">Render Berbasis Canvas (Presisi 300 DPI untuk Print)</p>
                </div>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow flex items-center gap-2 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                    </svg>
                    Print Stiker
                </button>
            </div>

            <div class="bg-blue-50 border border-blue-100 rounded-lg p-4 mb-4">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="font-semibold text-blue-800 text-sm uppercase tracking-wider">Daftar Data Stiker</h2>
                    <button onclick="addDataRow()" class="text-sm bg-blue-100 hover:bg-blue-200 text-blue-700 py-1 px-3 rounded border border-blue-300 transition">
                        + Tambah Data
                    </button>
                </div>
                
                <div class="grid grid-cols-12 gap-2 mb-2 text-xs font-semibold text-gray-600 text-center">
                    <div class="col-span-3 text-left">Nama Perusahaan</div>
                    <div class="col-span-3 text-left">Detail Produk</div>
                    <div class="col-span-3 text-left">Data dalam QR</div>
                    <div class="col-span-2">Jumlah (Pcs)</div>
                    <div class="col-span-1">Aksi</div>
                </div>

                <div id="data-container" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                    <!-- Baris Form Injeksi JS -->
                </div>
            </div>

            <!-- Panel Kalibrasi & Ukuran -->
            <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 grid grid-cols-1 md:grid-cols-3 gap-6 shadow-inner">
                <!-- Kolom 1: Kertas -->
                <div class="flex flex-col gap-2">
                    <span class="font-semibold text-gray-700 text-xs uppercase border-b border-gray-300 pb-1 mb-1">1. Setelan Kertas A4 (Luar)</span>
                    <label class="text-xs text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Margin Atas (mm): <input type="number" id="marginTop" step="0.5" class="w-16 px-2 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-xs text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Margin Kiri (mm): <input type="number" id="marginLeft" step="0.5" class="w-16 px-2 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-xs text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Jarak Kolom/X (mm): <input type="number" id="gapX" step="0.5" class="w-16 px-2 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-xs text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Jarak Baris/Y (mm): <input type="number" id="gapY" step="0.5" class="w-16 px-2 py-1 border rounded text-right focus:ring-blue-500"></label>
                </div>
                
                <!-- Kolom 2: Ukuran Elemen -->
                <div class="flex flex-col gap-1">
                    <span class="font-semibold text-gray-700 text-xs uppercase border-b border-gray-300 pb-1 mb-1">2. Ukuran Elemen</span>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Lebar Kotak (mm): <input type="number" id="labelWidth" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Tinggi Kotak (mm): <input type="number" id="labelHeight" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Ukuran QR (mm): <input type="number" id="qrSize" step="1" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Font Persh. (pt): <input type="number" id="fontCompany" step="1" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Font Produk (pt): <input type="number" id="fontProduct" step="1" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Padding/Tepi (mm): <input type="number" id="stickerPadding" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                </div>

                <!-- Kolom 3: Posisi/Offset -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-end border-b border-gray-300 pb-1 mb-1">
                        <span class="font-semibold text-gray-700 text-xs uppercase">3. Geser Kalibrasi (Dalam)</span>
                        <button onclick="resetSettings()" class="text-[10px] text-red-600 hover:text-red-800 underline bg-red-50 px-2 py-0.5 rounded border border-red-200">Reset Default</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-1">
                        <label class="text-[11px] text-gray-600 flex flex-col font-medium">QR Geser X (↔) <input type="number" id="qrOffsetX" step="0.5" class="w-full px-1 py-1.5 border rounded text-center mt-1 focus:ring-blue-500"></label>
                        <label class="text-[11px] text-gray-600 flex flex-col font-medium">QR Geser Y (↕) <input type="number" id="qrOffsetY" step="0.5" class="w-full px-1 py-1.5 border rounded text-center mt-1 focus:ring-blue-500"></label>
                        <label class="text-[11px] text-gray-600 flex flex-col font-medium">Teks Geser X (↔) <input type="number" id="textOffsetX" step="0.5" class="w-full px-1 py-1.5 border rounded text-center mt-1 focus:ring-blue-500"></label>
                        <label class="text-[11px] text-gray-600 flex flex-col font-medium">Teks Geser Y (↕) <input type="number" id="textOffsetY" step="0.5" class="w-full px-1 py-1.5 border rounded text-center mt-1 focus:ring-blue-500"></label>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="preview-container" class="w-full flex flex-col items-center py-10">
        <!-- Canvas Akan Digenerate Disini -->
    </main>

    <!-- Custom Toast Message -->
    <div id="custom-toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-medium px-6 py-3 rounded-lg shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        Pesan Notifikasi
    </div>

    <!-- Hidden div untuk generate temporary QR codes sebelum dipindah ke Canvas -->
    <div id="qr-temp" class="hidden"></div>

    <script>
        const defaultData = [
            { id: 1, company: "PT. Eka Maju Mesinindo", product: "T: Rak Besi", qr: "Rak Besi", qty: 1 },
            { id: 2, company: "PT. Eka Maju Mesinindo", product: "T: LED Pojector Mini", qr: "LED Projector", qty: 1 },
            { id: 3, company: "PT. Eka Maju Mesinindo", product: "T: BenQ Monitor 16 inch", qr: "BenQ Monitor", qty: 1 },
            { id: 4, company: "EXT Line Tlp", product: "14 Bu Era", qr: "14", qty: 1 },
            { id: 5, company: "EXT Line Tlp", product: "15 IT Dept", qr: "15", qty: 1 },
            { id: 6, company: "EXT Line Tlp", product: "16 Bu Esti", qr: "16", qty: 1 },
            { id: 7, company: "EXT Line Tlp", product: "18 Bu Yulia", qr: "18", qty: 1 },
            { id: 8, company: "EXT Line Tlp", product: "20 Pak Karno", qr: "20", qty: 1 },
            { id: 9, company: "EXT Line Tlp", product: "21 Bu Marlina", qr: "21", qty: 1 },
            { id: 10, company: "EXT Line Tlp", product: "23 Bu Rahma", qr: "23", qty: 1 },
            { id: 11, company: "EXT Line Tlp", product: "17 Sparepart", qr: "17", qty: 1 },
            { id: 12, company: "EXT Line Tlp", product: "22 Aftersales", qr: "22", qty: 1 }
        ];

        const defaultSettings = {
            marginTop: 15, marginLeft: 28, gapX: 3, gapY: 2,
            labelWidth: 75, labelHeight: 38,
            qrSize: 25, fontCompany: 10, fontProduct: 9, stickerPadding: 4,
            qrOffsetX: 0, qrOffsetY: 0, textOffsetX: 0, textOffsetY: 0
        };

        // Local Storage Init
        let stickerData = JSON.parse(localStorage.getItem('tj121_data_canvas'));
        if (!stickerData || stickerData.length === 0) {
            stickerData = JSON.parse(JSON.stringify(defaultData)); 
        }

        let settings = JSON.parse(localStorage.getItem('tj121_settings_canvas')) || { ...defaultSettings };
        settings = { ...defaultSettings, ...settings };

        const elMap = {};

        // Custom Toast Box (Pengganti Alert)
        function showToast(message) {
            const toast = document.getElementById('custom-toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dataContainer = document.getElementById('data-container');
            
            // Bind Input Setting ke Variabel
            Object.keys(defaultSettings).forEach(key => {
                elMap[key] = document.getElementById(key);
                if(elMap[key]) {
                    elMap[key].value = settings[key];
                    elMap[key].addEventListener('input', (e) => {
                        settings[key] = parseFloat(e.target.value) || 0;
                        saveSettingsToLocal();
                        renderCanvasPages(); // Panggil fungsi render canvas
                    });
                }
            });

            window.saveDataToLocal = () => localStorage.setItem('tj121_data_canvas', JSON.stringify(stickerData));
            window.saveSettingsToLocal = () => localStorage.setItem('tj121_settings_canvas', JSON.stringify(settings));

            window.resetSettings = () => {
                settings = { ...defaultSettings };
                Object.keys(settings).forEach(key => {
                    if(elMap[key]) elMap[key].value = settings[key];
                });
                saveSettingsToLocal();
                renderCanvasPages();
            };

            window.renderFormRows = function() {
                dataContainer.innerHTML = '';
                stickerData.forEach((data, index) => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'grid grid-cols-12 gap-2 items-center bg-white p-2 rounded border border-gray-200 shadow-sm hover:shadow transition-shadow';
                    
                    rowDiv.innerHTML = `
                        <div class="col-span-3">
                            <input type="text" value="${data.company}" oninput="updateData(${index}, 'company', this.value)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm font-semibold focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="col-span-3">
                            <input type="text" value="${data.product}" oninput="updateData(${index}, 'product', this.value)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="col-span-3">
                            <input type="text" value="${data.qr}" oninput="updateData(${index}, 'qr', this.value)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="col-span-2">
                            <input type="number" value="${data.qty}" min="1" oninput="updateData(${index}, 'qty', this.value)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm text-center focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="col-span-1 text-center">
                            <button onclick="removeDataRow(${index})" class="text-red-500 hover:text-red-700 p-1 bg-red-50 rounded hover:bg-red-100 transition" title="Hapus Baris">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                            </button>
                        </div>
                    `;
                    dataContainer.appendChild(rowDiv);
                });
                renderCanvasPages(); 
            };

            window.addDataRow = function() {
                stickerData.push({ id: Date.now(), company: "Baru", product: "Deskripsi", qr: "123", qty: 1 });
                saveDataToLocal();
                renderFormRows();
            };

            window.removeDataRow = function(index) {
                if (stickerData.length > 1) {
                    stickerData.splice(index, 1);
                    saveDataToLocal();
                    renderFormRows();
                } else {
                    showToast("Peringatan: Minimal harus ada 1 data stiker!");
                }
            };

            window.updateData = function(index, field, value) {
                if (field === 'qty') stickerData[index][field] = parseInt(value) || 1;
                else stickerData[index][field] = value;
                saveDataToLocal();
                
                // Gunakan debounce kecil agar render canvas tidak lag saat mengetik cepat
                clearTimeout(window.renderTimeout);
                window.renderTimeout = setTimeout(() => renderCanvasPages(), 100);
            };

            window.renderCanvasPages = function() {
                const container = document.getElementById('preview-container');
                const qrTemp = document.getElementById('qr-temp');
                container.innerHTML = ''; 
                qrTemp.innerHTML = '';

                // Resolusi Cetak: 300 DPI (Sangat Tajam)
                const DPI = 300;
                const mm2px = DPI / 25.4; // Konversi mm ke pixel (sekitar 11.811)
                const pt2px = DPI / 72;   // Konversi point (font) ke pixel (sekitar 4.166)

                // Ukuran A4 dalam Pixel
                const a4WidthPx = 210 * mm2px;
                const a4HeightPx = 297 * mm2px;

                // Ukuran Stiker (Dinamis dari Input User)
                const labelWPx = settings.labelWidth * mm2px;
                const labelHPx = settings.labelHeight * mm2px;

                // Pengaturan dari User
                const marginTPx = settings.marginTop * mm2px;
                const marginLPx = settings.marginLeft * mm2px;
                const gapXPx = settings.gapX * mm2px;
                const gapYPx = settings.gapY * mm2px;
                const paddingPx = settings.stickerPadding * mm2px;

                const qrSizePx = settings.qrSize * mm2px;
                const fontCompanyPx = settings.fontCompany * pt2px;
                const fontProductPx = settings.fontProduct * pt2px;

                // Offsets
                const qrOffXPx = settings.qrOffsetX * mm2px;
                const qrOffYPx = settings.qrOffsetY * mm2px;
                const txtOffXPx = settings.textOffsetX * mm2px;
                const txtOffYPx = settings.textOffsetY * mm2px;

                // Hitung Flat Array Barang yang Akan Dicetak
                let flatLabels = [];
                stickerData.forEach(item => {
                    for(let i=0; i < item.qty; i++) {
                        flatLabels.push(item);
                    }
                });

                // Layout Kertas
                const cols = 2;
                // Asumsi standar T&J 121 memiliki 7 baris per lembar A4 (Total 14 Stiker/Lembar)
                const rowsPerPage = 7; 
                const labelsPerPage = cols * rowsPerPage;

                let ctx = null;

                flatLabels.forEach((item, index) => {
                    // Buat Halaman (Canvas) Baru jika diperlukan
                    if (index % labelsPerPage === 0) {
                        const canvas = document.createElement('canvas');
                        canvas.width = a4WidthPx;
                        canvas.height = a4HeightPx;
                        canvas.className = 'a4-canvas';
                        container.appendChild(canvas);

                        ctx = canvas.getContext('2d');
                        // Warna dasar putih A4
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, a4WidthPx, a4HeightPx);
                        
                        // Aktifkan anti-aliasing untuk teks
                        ctx.textBaseline = 'top';
                    }

                    // Posisi Stiker di Halaman
                    const pageIndex = index % labelsPerPage;
                    const col = pageIndex % cols;
                    const row = Math.floor(pageIndex / cols);

                    const x = marginLPx + col * (labelWPx + gapXPx);
                    const y = marginTPx + row * (labelHPx + gapYPx);

                    // 1. Gambar Garis Tepi Hitam (Border)
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1.5 * (DPI / 96); // Sesuaikan ketebalan garis dengan DPI
                    ctx.strokeRect(x, y, labelWPx, labelHPx);

                    // --- Area Clipping (Agar isi stiker tidak keluar dari kotak jika kepanjangan) ---
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, labelWPx, labelHPx);
                    ctx.clip();

                    // 2. Render QR Code (Gunakan lib QRCode.js pada temp div, lalu salin ke canvas)
                    const qrActualX = x + paddingPx + qrOffXPx;
                    const qrActualY = y + (labelHPx - qrSizePx) / 2 + qrOffYPx; // Rata tengah vertikal otomatis
                    
                    const tempId = `qr-${index}`;
                    const tempDiv = document.createElement('div');
                    tempDiv.id = tempId;
                    qrTemp.appendChild(tempDiv);

                    // Generate QR
                    try {
                        new QRCode(tempDiv, {
                            text: item.qr || ' ',
                            width: 256, // Base resolusi tinggi
                            height: 256,
                            colorDark : "#000000",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.M
                        });
                        
                        // QRCode.js secara sinkronus merender canvas di dalam DOM
                        const qrGeneratedCanvas = tempDiv.querySelector('canvas');
                        if (qrGeneratedCanvas) {
                            ctx.drawImage(qrGeneratedCanvas, qrActualX, qrActualY, qrSizePx, qrSizePx);
                        }
                    } catch (e) { console.warn('QR Render Error:', e); }

                    // 3. Render Teks
                    ctx.fillStyle = '#000000';
                    const textStartX = qrActualX + qrSizePx + paddingPx + txtOffXPx;
                    const lineSpacing = 1.5 * mm2px; // Jarak antar baris 1.5mm
                    
                    // Hitung total tinggi teks untuk perataan tengah vertikal
                    const totalTextHeight = fontCompanyPx + lineSpacing + fontProductPx;
                    const textStartY = y + (labelHPx - totalTextHeight) / 2 + txtOffYPx;

                    // Nama Perusahaan (Bold)
                    ctx.font = `bold ${fontCompanyPx}px Arial, Helvetica, sans-serif`;
                    ctx.fillText(item.company, textStartX, textStartY);

                    // Nama Produk (Normal)
                    ctx.font = `normal ${fontProductPx}px Arial, Helvetica, sans-serif`;
                    ctx.fillText(item.product, textStartX, textStartY + fontCompanyPx + lineSpacing);

                    // Selesai Clipping Area Label
                    ctx.restore();
                });
            };

            // Init aplikasi
            renderFormRows();
        });
    </script>
</body>
</html>
