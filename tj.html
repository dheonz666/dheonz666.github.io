<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Stiker T&J (All-in-One)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QRCode.js untuk Generate QR 2D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- SheetJS untuk Export / Import Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Area Canvas untuk Print */
        .a4-canvas {
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            margin: 0 auto 20px auto;
            display: block;
        }

        /* Pengaturan Cetak (Print) Absolut */
        @media print {
            body { 
                background-color: white; 
                margin: 0;
                padding: 0;
            }
            .no-print { 
                display: none !important; 
            }
            #preview-container {
                padding: 0 !important;
                background: none !important;
            }
            .a4-canvas {
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always; 
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-gray-200 min-h-screen font-sans">

    <header class="bg-white border-b border-gray-200 p-4 md:p-6 shadow-sm z-10 no-print pb-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Cetak Stiker T&J (All-in-One)</h1>
                    <p class="text-sm text-gray-500">Render Berbasis Canvas (Presisi 300 DPI untuk Print)</p>
                </div>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow flex items-center gap-2 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                    </svg>
                    Print Stiker
                </button>
            </div>

            <!-- Panel Template & Mode -->
            <div class="flex flex-col md:flex-row gap-4 mb-4">
                <div class="bg-emerald-50 border border-emerald-200 p-3 rounded-lg flex-1 flex justify-between items-center gap-3 shadow-inner">
                    <label class="font-bold text-emerald-800 text-sm whitespace-nowrap">📜 Template T&J:</label>
                    <select id="templateSelect" class="border border-emerald-300 rounded px-3 py-1.5 text-sm bg-white font-medium focus:ring-emerald-500 w-full cursor-pointer">
                        <option value="custom">🛠️ Custom (Atur Sendiri)</option>
                        <option value="98">📄 No. 98 (5 x 21 mm) - 210 Pcs/Lembar</option>
                        <option value="103">📄 No. 103 (32 x 64 mm) - 12 Pcs/Lembar</option>
                        <option value="107">📄 No. 107 (18 x 50 mm) - 28 Pcs/Lembar</option>
                        <option value="108">📄 No. 108 (18 x 38 mm) - 40 Pcs/Lembar</option>
                        <option value="112">📄 No. 112 (36 x 80 mm) - 8 Pcs/Lembar</option>
                        <option value="121">📄 No. 121 (38 x 75 mm) - 10 Pcs/Lembar</option>
                        <option value="123">📄 No. 123 (11 x 30 mm) - 70 Pcs/Lembar</option>
                        <option value="129">📄 No. 129 (17 x 58 mm) - 24 Pcs/Lembar</option>
                    </select>
                </div>
                
                <div class="bg-indigo-50 border border-indigo-200 p-3 rounded-lg flex-1 flex justify-between items-center gap-3 shadow-inner">
                    <label class="font-bold text-indigo-800 text-sm whitespace-nowrap">⚙️ Mode Cetak:</label>
                    <select id="modeSelect" class="border border-indigo-300 rounded px-3 py-1.5 text-sm bg-white font-medium focus:ring-indigo-500 w-full cursor-pointer">
                        <option value="qr">📷 Pakai QR Code & Teks</option>
                        <option value="address">📝 Hanya Teks (Alamat / Ekspedisi)</option>
                    </select>
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-100 rounded-lg p-4 mb-4">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-3 gap-3">
                    <h2 class="font-semibold text-blue-800 text-sm uppercase tracking-wider">Daftar Data Stiker</h2>
                    <div class="flex gap-2 flex-wrap">
                        <!-- Input File Tersembunyi untuk Import -->
                        <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden" onchange="handleExcelImport(event)">
                        
                        <button onclick="document.getElementById('excelInput').click()" class="text-sm bg-emerald-100 hover:bg-emerald-200 text-emerald-700 py-1.5 px-3 rounded border border-emerald-300 transition font-bold flex items-center gap-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                            Import Excel
                        </button>
                        
                        <button onclick="exportExcel()" class="text-sm bg-indigo-100 hover:bg-indigo-200 text-indigo-700 py-1.5 px-3 rounded border border-indigo-300 transition font-bold flex items-center gap-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            Export Excel
                        </button>
                        
                        <button onclick="clearAllData()" class="text-sm bg-red-100 hover:bg-red-200 text-red-700 py-1.5 px-3 rounded border border-red-300 transition font-bold shadow-sm">
                            Hapus Semua
                        </button>

                        <button onclick="addDataRow()" class="text-sm bg-blue-600 hover:bg-blue-700 text-white py-1.5 px-3 rounded border border-blue-700 transition font-bold shadow-sm">
                            + Tambah Data
                        </button>
                    </div>
                </div>
                
                <div class="grid grid-cols-12 gap-2 mb-2 text-xs font-semibold text-gray-700 text-center bg-blue-100 p-2 rounded">
                    <div id="th-field1" class="col-span-3 text-left">Nama Perusahaan</div>
                    <div id="th-field2" class="col-span-3 text-left">Detail Produk</div>
                    <div id="th-field3" class="col-span-3 text-left">Data dalam QR</div>
                    <div class="col-span-2">Jumlah Cetak (Pcs)</div>
                    <div class="col-span-1">Aksi</div>
                </div>

                <div id="data-container" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                    <!-- Baris Form Injeksi JS -->
                </div>
            </div>

            <!-- Panel Kalibrasi & Ukuran -->
            <div id="calibration-panel" class="bg-gray-50 border border-gray-200 rounded-lg p-4 grid grid-cols-1 md:grid-cols-3 gap-6 shadow-inner">
                <!-- Kolom 1: Kertas -->
                <div class="flex flex-col gap-1.5">
                    <span class="font-semibold text-gray-700 text-xs uppercase border-b border-gray-300 pb-1 mb-1">1. Layout Kertas</span>
                    <div class="grid grid-cols-2 gap-2 mb-1">
                        <label class="text-[11px] text-gray-700 flex flex-col gap-1 font-medium">Orientasi Kertas: 
                            <select id="orientation" class="px-1 py-1 border rounded text-xs bg-white cursor-pointer focus:ring-blue-500 focus:border-blue-500">
                                <option value="portrait">Portrait (Tegak)</option>
                                <option value="landscape">Landscape (Mendatar)</option>
                            </select>
                        </label>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="text-[11px] text-gray-700 flex justify-between items-center">Kolom: <input type="number" id="cols" min="1" class="w-12 px-1 py-1 border rounded text-center focus:ring-blue-500"></label>
                        <label class="text-[11px] text-gray-700 flex justify-between items-center">Baris: <input type="number" id="rowsPerPage" min="1" class="w-12 px-1 py-1 border rounded text-center focus:ring-blue-500"></label>
                    </div>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Margin Atas (mm): <input type="number" id="marginTop" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Margin Kiri (mm): <input type="number" id="marginLeft" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Jarak X/Kanan (mm): <input type="number" id="gapX" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Jarak Y/Bawah (mm): <input type="number" id="gapY" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                </div>
                
                <!-- Kolom 2: Ukuran Elemen -->
                <div class="flex flex-col gap-1.5">
                    <span class="font-semibold text-gray-700 text-xs uppercase border-b border-gray-300 pb-1 mb-1">2. Dimensi Stiker</span>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Lebar Kotak (mm): <input type="number" id="labelWidth" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Tinggi Kotak (mm): <input type="number" id="labelHeight" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Ukuran QR (mm): <input type="number" id="qrSize" step="1" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Font Baris 1 (pt): <input type="number" id="fontCompany" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Font Baris 2/3 (pt): <input type="number" id="fontProduct" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                    <label class="text-[11px] text-gray-700 flex justify-between items-center hover:bg-gray-100 p-1 rounded">Jarak Tepi Dalam (mm): <input type="number" id="stickerPadding" step="0.5" class="w-14 px-1 py-1 border rounded text-right focus:ring-blue-500"></label>
                </div>

                <!-- Kolom 3: Posisi/Offset -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-end border-b border-gray-300 pb-1 mb-1">
                        <span class="font-semibold text-gray-700 text-xs uppercase">3. Geser Kalibrasi</span>
                        <button onclick="handleResetSettings()" class="text-[10px] text-red-600 hover:text-red-800 underline bg-red-50 px-2 py-0.5 rounded border border-red-200">Reset Kalibrasi</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <label class="text-[11px] text-gray-600 flex flex-col font-medium">QR Geser X (↔) <input type="number" id="qrOffsetX" step="0.5" title="Minus ke kiri, Plus ke kanan" class="w-full px-1 py-1.5 border rounded text-center mt-1 focus:ring-blue-500"></label>
                        <label class="text-[11px] text-gray-600 flex flex-col font-medium">QR Geser Y (↕) <input type="number" id="qrOffsetY" step="0.5" title="Minus ke atas, Plus ke bawah" class="w-full px-1 py-1.5 border rounded text-center mt-1 focus:ring-blue-500"></label>
                        <label class="text-[11px] text-gray-600 flex flex-col font-medium">Teks Geser X (↔) <input type="number" id="textOffsetX" step="0.5" class="w-full px-1 py-1.5 border rounded text-center mt-1 focus:ring-blue-500"></label>
                        <label class="text-[11px] text-gray-600 flex flex-col font-medium">Teks Geser Y (↕) <input type="number" id="textOffsetY" step="0.5" class="w-full px-1 py-1.5 border rounded text-center mt-1 focus:ring-blue-500"></label>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="preview-container" class="w-full flex flex-col items-center py-10 no-print-bg pb-20">
        <!-- Canvas Akan Digenerate Disini -->
    </main>

    <!-- Custom Toast Message -->
    <div id="custom-toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white font-medium px-6 py-3 rounded-lg shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2">
        <span id="toast-icon">ℹ️</span>
        <span id="toast-message">Pesan Notifikasi</span>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="custom-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 z-50 px-4">
        <div class="bg-white rounded-lg shadow-2xl p-6 max-w-md w-full transform scale-95 transition-transform duration-300" id="custom-modal-content">
            <h3 class="text-xl font-bold text-gray-900 mb-2" id="modal-title">Konfirmasi</h3>
            <p class="text-gray-600 mb-6 text-sm" id="modal-desc">Apakah anda yakin?</p>
            <div class="flex justify-end gap-3" id="modal-buttons">
                <!-- Buttons injected by JS -->
            </div>
        </div>
    </div>

    <!-- Hidden div untuk generate temporary QR codes sebelum dipindah ke Canvas -->
    <div id="qr-temp" class="hidden"></div>

    <script>
        // Pustaka Template Standar Tom & Jerry
        const TEMPLATES = {
            '98': { labelWidth: 21, labelHeight: 5, cols: 7, rowsPerPage: 30, marginTop: 15, marginLeft: 20, gapX: 2, gapY: 2, qrSize: 4, fontCompany: 4, fontProduct: 3, stickerPadding: 0.5, orientation: 'portrait' },
            '103': { labelWidth: 64, labelHeight: 32, cols: 3, rowsPerPage: 4, marginTop: 15, marginLeft: 6, gapX: 2, gapY: 2, qrSize: 22, fontCompany: 10, fontProduct: 9, stickerPadding: 4, orientation: 'portrait' },
            '107': { labelWidth: 50, labelHeight: 18, cols: 4, rowsPerPage: 7, marginTop: 15, marginLeft: 3, gapX: 2, gapY: 2, qrSize: 14, fontCompany: 8, fontProduct: 7, stickerPadding: 2, orientation: 'portrait' },
            '108': { labelWidth: 38, labelHeight: 18, cols: 5, rowsPerPage: 8, marginTop: 15, marginLeft: 7, gapX: 2, gapY: 1, qrSize: 14, fontCompany: 7, fontProduct: 6, stickerPadding: 2, orientation: 'portrait' },
            '112': { labelWidth: 80, labelHeight: 36, cols: 2, rowsPerPage: 4, marginTop: 15, marginLeft: 20, gapX: 5, gapY: 5, qrSize: 25, fontCompany: 11, fontProduct: 10, stickerPadding: 4, orientation: 'portrait' },
            '121': { labelWidth: 75, labelHeight: 38, cols: 2, rowsPerPage: 5, marginTop: 15, marginLeft: 28, gapX: 3, gapY: 2, qrSize: 25, fontCompany: 10, fontProduct: 9, stickerPadding: 4, orientation: 'portrait' },
            '123': { labelWidth: 30, labelHeight: 11, cols: 5, rowsPerPage: 14, marginTop: 15, marginLeft: 25, gapX: 2, gapY: 2, qrSize: 9, fontCompany: 6, fontProduct: 5, stickerPadding: 1, orientation: 'portrait' },
            '129': { labelWidth: 58, labelHeight: 17, cols: 3, rowsPerPage: 8, marginTop: 15, marginLeft: 14, gapX: 2, gapY: 2, qrSize: 13, fontCompany: 8, fontProduct: 7, stickerPadding: 2, orientation: 'portrait' }
        };

        const defaultData = [
            { id: 1, field1: "PT. Eka Maju Mesinindo", field2: "T: Rak Besi", field3: "Rak Besi", qty: 1 },
            { id: 2, field1: "PT. Eka Maju Mesinindo", field2: "T: LED Pojector Mini", field3: "LED Projector", qty: 1 },
            { id: 3, field1: "PT. Eka Maju Mesinindo", field2: "T: BenQ Monitor 16 inch", field3: "BenQ Monitor", qty: 1 },
            { id: 4, field1: "EXT Line Tlp", field2: "14 Bu Era", field3: "14", qty: 1 },
            { id: 5, field1: "EXT Line Tlp", field2: "15 IT Dept", field3: "15", qty: 1 },
            { id: 6, field1: "EXT Line Tlp", field2: "16 Bu Esti", field3: "16", qty: 1 },
            { id: 7, field1: "EXT Line Tlp", field2: "18 Bu Yulia", field3: "18", qty: 1 },
            { id: 8, field1: "EXT Line Tlp", field2: "20 Pak Karno", field3: "20", qty: 1 },
            { id: 9, field1: "EXT Line Tlp", field2: "21 Bu Marlina", field3: "21", qty: 1 },
            { id: 10, field1: "EXT Line Tlp", field2: "23 Bu Rahma", field3: "23", qty: 1 },
            { id: 11, field1: "EXT Line Tlp", field2: "17 Sparepart", field3: "17", qty: 1 },
            { id: 12, field1: "EXT Line Tlp", field2: "22 Aftersales", field3: "22", qty: 1 }
        ];

        const defaultSettings = {
            template: '121', mode: 'qr', orientation: 'portrait',
            cols: 2, rowsPerPage: 5,
            marginTop: 15, marginLeft: 28, gapX: 3, gapY: 2,
            labelWidth: 75, labelHeight: 38,
            qrSize: 25, fontCompany: 10, fontProduct: 9, stickerPadding: 4,
            qrOffsetX: 0, qrOffsetY: 0, textOffsetX: 0, textOffsetY: 0
        };

        // Load Storage
        let stickerData = JSON.parse(localStorage.getItem('tj_all_data_final'));
        if (!stickerData || stickerData.length === 0) {
            stickerData = JSON.parse(JSON.stringify(defaultData)); 
        }

        let settings = JSON.parse(localStorage.getItem('tj_all_settings_final')) || { ...defaultSettings };
        settings = { ...defaultSettings, ...settings };

        const elMap = {};
        let pendingExcelData = null;

        function showToast(message, type = 'info') {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-message').textContent = message;
            
            // Set Color based on type
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 text-white font-medium px-6 py-3 rounded-lg shadow-xl transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2 ${type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-emerald-600' : 'bg-gray-800'}`;
            document.getElementById('toast-icon').textContent = type === 'error' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️';

            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        function showModal(title, desc, buttons) {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('custom-modal-content');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const btnContainer = document.getElementById('modal-buttons');

            titleEl.textContent = title;
            descEl.innerHTML = desc;
            btnContainer.innerHTML = '';

            buttons.forEach(btn => {
                const b = document.createElement('button');
                b.textContent = btn.text;
                b.className = `px-4 py-2 rounded font-medium transition ${btn.styleClass}`;
                b.onclick = () => {
                    if(btn.action) btn.action();
                    closeModal();
                };
                btnContainer.appendChild(b);
            });

            modal.classList.remove('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('custom-modal-content');
            modal.classList.add('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dataContainer = document.getElementById('data-container');
            const elTemplate = document.getElementById('templateSelect');
            const elMode = document.getElementById('modeSelect');
            const elOrientation = document.getElementById('orientation');
            
            // Set Initial Values
            if(elTemplate) elTemplate.value = settings.template;
            if(elMode) elMode.value = settings.mode;
            if(elOrientation) elOrientation.value = settings.orientation || 'portrait';

            // Bind Input Setting
            const settingKeys = Object.keys(defaultSettings).filter(k => k !== 'template' && k !== 'mode' && k !== 'orientation');
            settingKeys.forEach(key => {
                elMap[key] = document.getElementById(key);
                if(elMap[key]) {
                    elMap[key].value = settings[key];
                    elMap[key].addEventListener('input', (e) => {
                        settings[key] = parseFloat(e.target.value) || 0;
                        elTemplate.value = 'custom';
                        settings.template = 'custom';
                        saveSettingsToLocal();
                        renderCanvasPages(); 
                    });
                }
            });

            // Handlers for Dropdowns
            elTemplate.addEventListener('change', (e) => {
                const tmpl = e.target.value;
                settings.template = tmpl;
                if(TEMPLATES[tmpl]) {
                    const preset = TEMPLATES[tmpl];
                    Object.keys(preset).forEach(k => {
                        settings[k] = preset[k];
                        if(elMap[k]) elMap[k].value = preset[k];
                    });
                    // Reset orientation in UI based on template default
                    if(elOrientation) elOrientation.value = preset.orientation;
                }
                saveSettingsToLocal();
                renderCanvasPages();
                showToast(`Template diubah ke ${e.target.options[e.target.selectedIndex].text}`, 'success');
            });

            elMode.addEventListener('change', (e) => {
                settings.mode = e.target.value;
                saveSettingsToLocal();
                updateFormUI();
                renderFormRows();
                renderCanvasPages();
            });

            if(elOrientation) {
                elOrientation.addEventListener('change', (e) => {
                    settings.orientation = e.target.value;
                    saveSettingsToLocal();
                    renderCanvasPages();
                });
            }

            window.saveDataToLocal = () => localStorage.setItem('tj_all_data_final', JSON.stringify(stickerData));
            window.saveSettingsToLocal = () => localStorage.setItem('tj_all_settings_final', JSON.stringify(settings));

            window.handleResetSettings = function() {
                showModal(
                    "Reset Kalibrasi", 
                    "Apakah Anda yakin ingin mengembalikan semua setelan margin, ukuran, dan pergeseran ke bawaan template?",
                    [
                        { text: "Batal", styleClass: "bg-gray-200 text-gray-800 hover:bg-gray-300" },
                        { text: "Ya, Reset", styleClass: "bg-red-600 text-white hover:bg-red-700", action: () => {
                            // Cek template aktif
                            const tmpl = settings.template;
                            if(TEMPLATES[tmpl]) {
                                const preset = TEMPLATES[tmpl];
                                Object.keys(preset).forEach(k => settings[k] = preset[k]);
                            } else {
                                // Default fallback ke T&J 121
                                Object.keys(defaultSettings).forEach(k => settings[k] = defaultSettings[k]);
                            }
                            
                            // Reset offsets yang mungkin tidak ada di preset
                            settings.qrOffsetX = 0; settings.qrOffsetY = 0;
                            settings.textOffsetX = 0; settings.textOffsetY = 0;
                            
                            Object.keys(settings).forEach(key => {
                                if(elMap[key]) elMap[key].value = settings[key];
                            });
                            saveSettingsToLocal();
                            renderCanvasPages();
                            showToast("Kalibrasi berhasil direset.", "success");
                        }}
                    ]
                );
            };

            window.updateFormUI = function() {
                const isAddr = settings.mode === 'address';
                document.getElementById('th-field1').textContent = isAddr ? "Nama Penerima/PT" : "Nama Perusahaan";
                document.getElementById('th-field2').textContent = isAddr ? "Alamat Lengkap" : "Detail Produk";
                document.getElementById('th-field3').textContent = isAddr ? "No Telp / Info" : "Data dalam QR";
            };

            window.renderFormRows = function() {
                dataContainer.innerHTML = '';
                const isAddr = settings.mode === 'address';

                if(stickerData.length === 0) {
                    dataContainer.innerHTML = `<div class="text-center p-4 text-gray-500 text-sm">Tidak ada data. Silakan tambah data atau import dari Excel.</div>`;
                }

                stickerData.forEach((data, index) => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'grid grid-cols-12 gap-2 items-center bg-white p-2 rounded border border-gray-200 shadow-sm hover:shadow transition-shadow';
                    
                    rowDiv.innerHTML = `
                        <div class="col-span-3">
                            <input type="text" value="${data.field1}" oninput="updateData(${index}, 'field1', this.value)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm font-semibold focus:ring-blue-500" placeholder="${isAddr ? 'Cth: Bpk Andi' : 'Perusahaan'}">
                        </div>
                        <div class="col-span-3">
                            <input type="text" value="${data.field2}" oninput="updateData(${index}, 'field2', this.value)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500" placeholder="${isAddr ? 'Jl. Mawar No. 1' : 'Produk'}">
                        </div>
                        <div class="col-span-3">
                            <input type="text" value="${data.field3}" oninput="updateData(${index}, 'field3', this.value)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500" placeholder="${isAddr ? '0812xxx' : 'Isi QR'}">
                        </div>
                        <div class="col-span-2">
                            <input type="number" value="${data.qty}" min="1" oninput="updateData(${index}, 'qty', this.value)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm text-center focus:ring-blue-500">
                        </div>
                        <div class="col-span-1 text-center">
                            <button onclick="removeDataRow(${index})" class="text-red-500 hover:text-red-700 p-1 bg-red-50 rounded hover:bg-red-100 transition" title="Hapus Baris">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                            </button>
                        </div>
                    `;
                    dataContainer.appendChild(rowDiv);
                });
                renderCanvasPages(); 
            };

            window.addDataRow = function() {
                stickerData.push({ id: Date.now(), field1: "Baru", field2: "Detail", field3: "Info", qty: 1 });
                saveDataToLocal();
                renderFormRows();
            };

            window.removeDataRow = function(index) {
                stickerData.splice(index, 1);
                saveDataToLocal();
                renderFormRows();
            };

            window.clearAllData = function() {
                if(stickerData.length === 0) return;
                showModal(
                    "Hapus Semua Data",
                    "Apakah Anda yakin ingin menghapus seluruh baris data stiker di layar?",
                    [
                        { text: "Batal", styleClass: "bg-gray-200 text-gray-800 hover:bg-gray-300" },
                        { text: "Hapus Semua", styleClass: "bg-red-600 text-white hover:bg-red-700", action: () => {
                            stickerData = [];
                            saveDataToLocal();
                            renderFormRows();
                            showToast("Semua data berhasil dihapus.", "success");
                        }}
                    ]
                );
            };

            window.updateData = function(index, field, value) {
                if (field === 'qty') stickerData[index][field] = parseInt(value) || 1;
                else stickerData[index][field] = value;
                saveDataToLocal();
                
                clearTimeout(window.renderTimeout);
                window.renderTimeout = setTimeout(() => renderCanvasPages(), 100);
            };

            window.exportExcel = function() {
                if (!window.XLSX) {
                    showToast("Library Excel belum dimuat. Tunggu sebentar.", "error");
                    return;
                }
                
                const isAddr = settings.mode === 'address';
                const h1 = isAddr ? "Nama Penerima" : "Nama Perusahaan";
                const h2 = isAddr ? "Alamat Lengkap" : "Detail Produk";
                const h3 = isAddr ? "No Telp" : "Data QR";
                
                const wsData = [ [h1, h2, h3, "Jumlah Cetak"] ];
                
                stickerData.forEach(d => {
                    wsData.push([d.field1, d.field2, d.field3, d.qty]);
                });
                
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "DataStiker");
                
                XLSX.writeFile(wb, "Template_Data_Stiker.xlsx");
                showToast("File Excel berhasil di-download!", "success");
            };

            window.handleExcelImport = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                if (!window.XLSX) {
                    showToast("Library Excel belum dimuat.", "error");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                        
                        if (json.length <= 1) {
                            showToast("File Excel kosong atau tidak ada datanya.", "error");
                            return;
                        }

                        const newData = [];
                        for (let i = 1; i < json.length; i++) {
                            const row = json[i];
                            if (!row || row.length === 0 || (!row[0] && !row[1] && !row[2])) continue;
                            
                            newData.push({
                                id: Date.now() + i,
                                field1: row[0] != null ? String(row[0]) : "",
                                field2: row[1] != null ? String(row[1]) : "",
                                field3: row[2] != null ? String(row[2]) : "",
                                qty: parseInt(row[3]) || 1
                            });
                        }

                        if (newData.length > 0) {
                            pendingExcelData = newData;
                            showModal(
                                "Import Data Excel",
                                `Ditemukan <b>${newData.length}</b> baris data yang valid dari Excel.<br><br>Apakah Anda ingin MENGGANTI semua data saat ini atau MENAMBAHKAN ke daftar bawah?`,
                                [
                                    { text: "Batal", styleClass: "bg-gray-200 text-gray-800 hover:bg-gray-300" },
                                    { text: "Tambahkan ke Bawah", styleClass: "bg-blue-600 text-white hover:bg-blue-700", action: () => {
                                        stickerData = stickerData.concat(pendingExcelData);
                                        finalizeImport();
                                    }},
                                    { text: "Ganti Semua Data", styleClass: "bg-emerald-600 text-white hover:bg-emerald-700", action: () => {
                                        stickerData = pendingExcelData;
                                        finalizeImport();
                                    }}
                                ]
                            );
                        } else {
                            showToast("Tidak ada baris data valid yang ditemukan.", "error");
                        }
                    } catch (err) {
                        console.error(err);
                        showToast("Gagal membaca file Excel. Pastikan formatnya benar.", "error");
                    }
                    
                    document.getElementById('excelInput').value = "";
                };
                reader.readAsArrayBuffer(file);
            };

            function finalizeImport() {
                saveDataToLocal();
                renderFormRows();
                showToast("Data Excel berhasil di-import!", "success");
                pendingExcelData = null;
            }

            window.renderCanvasPages = function() {
                const container = document.getElementById('preview-container');
                const qrTemp = document.getElementById('qr-temp');
                container.innerHTML = ''; 
                qrTemp.innerHTML = '';

                // CSS Kertas Dinamis
                let printStyle = document.getElementById('dynamic-print-style');
                if (!printStyle) {
                    printStyle = document.createElement('style');
                    printStyle.id = 'dynamic-print-style';
                    document.head.appendChild(printStyle);
                }
                printStyle.innerHTML = `@media print { @page { size: A4 ${settings.orientation || 'portrait'}; margin: 0; } }`;

                // 300 DPI Rendering
                const DPI = 300;
                const mm2px = DPI / 25.4; 
                const pt2px = DPI / 72;   

                const isLandscape = settings.orientation === 'landscape';
                const a4Width_mm = isLandscape ? 297 : 210;
                const a4Height_mm = isLandscape ? 210 : 297;

                const a4WidthPx = a4Width_mm * mm2px;
                const a4HeightPx = a4Height_mm * mm2px;

                const labelWPx = settings.labelWidth * mm2px;
                const labelHPx = settings.labelHeight * mm2px;

                const marginTPx = settings.marginTop * mm2px;
                const marginLPx = settings.marginLeft * mm2px;
                const gapXPx = settings.gapX * mm2px;
                const gapYPx = settings.gapY * mm2px;
                const paddingPx = settings.stickerPadding * mm2px;

                const qrSizePx = settings.qrSize * mm2px;
                const fontCompanyPx = settings.fontCompany * pt2px;
                const fontProductPx = settings.fontProduct * pt2px;

                const qrOffXPx = settings.qrOffsetX * mm2px;
                const qrOffYPx = settings.qrOffsetY * mm2px;
                const txtOffXPx = settings.textOffsetX * mm2px;
                const txtOffYPx = settings.textOffsetY * mm2px;

                let flatLabels = [];
                stickerData.forEach(item => {
                    for(let i=0; i < item.qty; i++) { flatLabels.push(item); }
                });

                if(flatLabels.length === 0) return;

                const cols = Math.max(1, settings.cols);
                const rowsPerPage = Math.max(1, settings.rowsPerPage); 
                const labelsPerPage = cols * rowsPerPage;

                let ctx = null;

                flatLabels.forEach((item, index) => {
                    if (index % labelsPerPage === 0) {
                        const canvas = document.createElement('canvas');
                        canvas.width = a4WidthPx;
                        canvas.height = a4HeightPx;
                        // Paksa ukuran tampilan monitor (css) ke milimeter
                        canvas.style.width = `${a4Width_mm}mm`;
                        canvas.style.height = `${a4Height_mm}mm`;
                        canvas.className = 'a4-canvas';
                        container.appendChild(canvas);

                        ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, a4WidthPx, a4HeightPx);
                        ctx.textBaseline = 'top';
                    }

                    const pageIndex = index % labelsPerPage;
                    const col = pageIndex % cols;
                    const row = Math.floor(pageIndex / cols);

                    const x = marginLPx + col * (labelWPx + gapXPx);
                    const y = marginTPx + row * (labelHPx + gapYPx);

                    // Border Kotak Stiker
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1.5 * (DPI / 96);
                    ctx.strokeRect(x, y, labelWPx, labelHPx);

                    // Area Clipping (Tidak tembus keluar batas kotak)
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, labelWPx, labelHPx);
                    ctx.clip();

                    ctx.fillStyle = '#000000';

                    if (settings.mode === 'qr') {
                        // ==== MODE QR ====
                        const qrActualX = x + paddingPx + qrOffXPx;
                        const qrActualY = y + (labelHPx - qrSizePx) / 2 + qrOffYPx;
                        
                        const tempId = `qr-${index}`;
                        const tempDiv = document.createElement('div');
                        tempDiv.id = tempId;
                        qrTemp.appendChild(tempDiv);

                        try {
                            new QRCode(tempDiv, {
                                text: item.field3 || ' ',
                                width: 256, height: 256,
                                colorDark : "#000000", colorLight : "#ffffff",
                                correctLevel : QRCode.CorrectLevel.M
                            });
                            
                            const qrGeneratedCanvas = tempDiv.querySelector('canvas');
                            if (qrGeneratedCanvas) {
                                ctx.drawImage(qrGeneratedCanvas, qrActualX, qrActualY, qrSizePx, qrSizePx);
                            }
                        } catch (e) {}

                        // Teks (Sebelah Kanan QR)
                        const textStartX = qrActualX + qrSizePx + paddingPx + txtOffXPx;
                        const lineSpacing = 1.5 * mm2px;
                        const totalTextHeight = fontCompanyPx + lineSpacing + fontProductPx;
                        const textStartY = y + (labelHPx - totalTextHeight) / 2 + txtOffYPx;

                        ctx.font = `bold ${fontCompanyPx}px Arial`;
                        ctx.fillText(item.field1, textStartX, textStartY);
                        ctx.font = `normal ${fontProductPx}px Arial`;
                        ctx.fillText(item.field2, textStartX, textStartY + fontCompanyPx + lineSpacing);

                    } else {
                        // ==== MODE ALAMAT (Tanpa QR) ====
                        const textStartX = x + paddingPx + txtOffXPx;
                        const lineSpacing = 1.8 * mm2px;
                        
                        // 3 Baris Rata Kiri
                        const totalTextHeight = fontCompanyPx + (fontProductPx * 2) + (lineSpacing * 2);
                        const textStartY = y + (labelHPx - totalTextHeight) / 2 + txtOffYPx;

                        ctx.font = `bold ${fontCompanyPx}px Arial`;
                        ctx.fillText(item.field1, textStartX, textStartY);
                        
                        ctx.font = `normal ${fontProductPx}px Arial`;
                        ctx.fillText(item.field2, textStartX, textStartY + fontCompanyPx + lineSpacing);
                        
                        ctx.fillText(item.field3, textStartX, textStartY + fontCompanyPx + fontProductPx + (lineSpacing * 2));
                    }

                    ctx.restore();
                });
            };

            // Init aplikasi
            updateFormUI();
            renderFormRows();
        });
    </script>
</body>
</html>
