        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { transition: background-color 0.3s, color 0.3s; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        
        .excel-table { border-collapse: collapse; width: 100%; }
        .excel-table th, .excel-table td { border: 1px solid #e2e8f0; }
        .dark .excel-table th, .dark .excel-table td { border: 1px solid #1e293b; }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px;
            border-radius: 12px;
            min-height: 50px;
            transition: all 0.3s;
        }
        .tag-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .tag-input {
            border: none;
            outline: none;
            background: transparent;
            flex-grow: 1;
            padding: 4px;
            font-size: 14px;
        }

        /* Customizing SweetAlert2 for better UX */
        .swal2-popup {
            border-radius: 20px !important;
            padding: 1.5rem !important;
        }
        .dark .swal2-popup {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
            border: 1px solid #1e293b !important;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 min-h-screen">

    <script>
        const SB_URL = 'https://hezegmtoqiecdpisqucp.supabase.co'; 
        const SB_KEY = 'sb_publishable_FP9-br7RV3tYaVIFJhAP_A_tr8SUNGh'; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let transactions = [];

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        
        function toggleTheme() {
            const doc = document.documentElement;
            if (doc.classList.contains('dark')) {
                doc.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                doc.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateThemeIcons();
        }
        
        function updateThemeIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            const sun = document.getElementById('theme-icon-sun');
            const moon = document.getElementById('theme-icon-moon');
            if (sun && moon) {
                sun.classList.toggle('hidden', isDark);
                moon.classList.toggle('hidden', !isDark);
            }
        }

        initTheme();
    </script>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-800 sticky top-8">

                    <div class="overflow-x-auto custom-scrollbar">

    <datalist id="cat-suggestions">
        <option value="Gaji"><option value="Makanan"><option value="Transportasi"><option value="Hiburan"><option value="Investasi">

    <script>
        window.onload = () => {
            lucide.createIcons();
            updateThemeIcons();
        };

        // --- SWEETALERT2 INTEGRATION ---
        function notify(message, type = 'success') {
            const isDark = document.documentElement.classList.contains('dark');
            Swal.fire({
                text: message,
                icon: type,
                toast: true,
                position: 'bottom-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
                background: isDark ? '#1e293b' : '#ffffff',
                color: isDark ? '#f1f5f9' : '#0f172a',
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer);
                    toast.addEventListener('mouseleave', Swal.resumeTimer);
                    toast.addEventListener('click', Swal.close); // Close on click anywhere
                }
            });
        }

        function handleTagInput(inputId, listId, stateArray, renderFn) {
            const input = document.getElementById(inputId);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    addTagFromInput(inputId, listId, stateArray, renderFn);
                }
            });
        }

        function addTagFromInput(inputId, listId, stateArray, renderFn) {
            const input = document.getElementById(inputId);
            const val = input.value.trim().replace(',', '');
            if (val && !stateArray.includes(val)) {
                stateArray.push(val);
                renderFn();
                input.value = '';
            }
        }

        function renderTags(listId, stateArray) {
            const list = document.getElementById(listId);
            list.innerHTML = '';
            stateArray.forEach((tag, index) => {
                const div = document.createElement('div');
                div.className = 'tag-item bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300';
                div.innerHTML = `${tag} <span class="ml-1 cursor-pointer hover:text-rose-500 font-bold" onclick="removeTag('${listId}', ${index})">&times;</span>`;
                list.appendChild(div);
            });
        }

        window.removeTag = (listId, index) => {
            if (listId === 'category-list') {
                currentCategories.splice(index, 1);
                renderTags('category-list', currentCategories);
            } else {
                currentDescriptions.splice(index, 1);
                renderTags('desc-list', currentDescriptions);
            }
        };

        handleTagInput('category-input', 'category-list', currentCategories, () => renderTags('category-list', currentCategories));
        handleTagInput('desc-input', 'desc-list', currentDescriptions, () => renderTags('desc-list', currentDescriptions));

        async function fetchTransactions() {
            setLoading(true);
            const { data, error } = await supabaseClient.from('transactions').select('*').order('transaction_date', { ascending: false });
            if (!error) { 
                transactions = data; 
                updateUI(); 
            }
            setLoading(false);
        }

        function getFilteredData() {
            const startDate = document.getElementById('filter-start').value;
            const endDate = document.getElementById('filter-end').value;
            
            return transactions.filter(tx => {
                const txDate = tx.transaction_date;
                if (startDate && txDate < startDate) return false;
                if (endDate && txDate > endDate) return false;
                return true;
            });
        }

        function updateUI() {
            const listEl = document.getElementById('tx-list');
            const noDataEl = document.getElementById('no-data');
            listEl.innerHTML = '';
            
            const filteredData = getFilteredData();

            if (filteredData.length === 0) {
                noDataEl.classList.remove('hidden');
            } else {
                noDataEl.classList.add('hidden');
                filteredData.forEach(tx => {
                    const isIncome = tx.type === 'income';
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors';
                    const cats = tx.category ? tx.category.split(',').filter(c => c && c !== '-').map(c => `<span class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-300 px-1.5 py-0.5 rounded text-[10px] font-bold mr-1 inline-block my-0.5">${c}</span>`).join('') : '-';
                    const descs = tx.description ? tx.description.split(',').filter(d => d && d !== '-').map(d => `<span class="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-1.5 py-0.5 rounded text-[10px] font-bold mr-1 inline-block my-0.5">${d}</span>`).join('') : '-';

                    row.innerHTML = `
                        <td class="px-4 py-4 text-xs text-slate-400 dark:text-slate-500 font-bold">${tx.transaction_date}</td>
                        <td class="px-4 py-4 text-sm">${cats || '-'}</td>
                        <td class="px-4 py-4 text-sm font-medium text-slate-700 dark:text-slate-300">${descs || '-'}</td>
                        <td class="px-4 py-4 text-right text-sm font-black ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isIncome ? '+' : '-'} ${formatCurrency(tx.amount)}
                        </td>
                        <td class="px-4 py-4">
                            <div class="flex justify-center gap-1">
                                <button onclick="editRecord(${tx.id})" class="p-1.5 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-600 hover:text-white transition"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                                <button onclick="deleteRecord(${tx.id})" class="p-1.5 rounded-lg bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 hover:bg-rose-600 hover:text-white transition"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </td>
                    `;
                    listEl.appendChild(row);
                });
                lucide.createIcons();
            }

            // HITUNG RINGKASAN BERDASARKAN FILTER
            const inc = filteredData.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
            const exp = filteredData.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
            
            document.getElementById('display-balance').innerText = formatCurrency(inc - exp);
            document.getElementById('display-income').innerText = formatCurrency(inc);
            document.getElementById('display-expense').innerText = formatCurrency(exp);
        }

        function resetFilter() {
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';
            updateUI();
        }

        document.getElementById('transaction-form').onsubmit = async (e) => {
            e.preventDefault();

            addTagFromInput('category-input', 'category-list', currentCategories, () => renderTags('category-list', currentCategories));
            addTagFromInput('desc-input', 'desc-list', currentDescriptions, () => renderTags('desc-list', currentDescriptions));

            if (currentCategories.length === 0) return notify("Pilih minimal satu Kategori", "warning");
            if (currentDescriptions.length === 0) return notify("Isi minimal satu Keterangan", "warning");

            const payload = {
                category: currentCategories.join(','),
                description: currentDescriptions.join(','),
                amount: document.getElementById('amount').value,
                type: document.querySelector('input[name="tx-type"]:checked').value,
                transaction_date: document.getElementById('date').value
            };

            setLoading(true);
            const res = editingId ? await supabaseClient.from('transactions').update(payload).eq('id', editingId) : await supabaseClient.from('transactions').insert([payload]);

            if (!res.error) {
                notify(editingId ? "Data diperbarui!" : "Berhasil disimpan!", "success");
                cancelEdit();
                fetchTransactions();
            } else {
                notify("Gagal: " + res.error.message, "error");
            }
            setLoading(false);
        };

        window.editRecord = (id) => {
            const tx = transactions.find(t => t.id === id);
            if (!tx) return;
            editingId = id;
            currentCategories = tx.category ? tx.category.split(',').filter(c => c && c !== '-') : [];
            currentDescriptions = tx.description ? tx.description.split(',').filter(d => d && d !== '-') : [];
            renderTags('category-list', currentCategories);
            renderTags('desc-list', currentDescriptions);
            document.getElementById('amount').value = tx.amount;
            document.getElementById('date').value = tx.transaction_date;
            document.querySelectorAll('input[name="tx-type"]').forEach(r => r.checked = r.value === tx.type);
            document.getElementById('form-title').innerHTML = `<span class="w-2 h-6 bg-amber-500 rounded-full"></span> Edit Rekod`;
            document.getElementById('submit-text').innerText = "Update Rekod";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function cancelEdit() {
            editingId = null;
            currentCategories = [];
            currentDescriptions = [];
            renderTags('category-list', []);
            renderTags('desc-list', []);
            document.getElementById('transaction-form').reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('form-title').innerHTML = `<span class="w-2 h-6 bg-blue-600 rounded-full"></span> Transaksi Baru`;
            document.getElementById('submit-text').innerText = "Simpan Transaksi";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        async function deleteRecord(id) {
            const isDark = document.documentElement.classList.contains('dark');
            const result = await Swal.fire({
                title: 'Hapus data?',
                text: "Data tidak bisa dikembalikan!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'Ya, Hapus!',
                cancelButtonText: 'Batal',
                background: isDark ? '#1e293b' : '#fff',
                color: isDark ? '#f1f5f9' : '#0f172a'
            });

            if (result.isConfirmed) {
                setLoading(true);
                const { error } = await supabaseClient.from('transactions').delete().eq('id', id);
                if (!error) {
                    notify("Data dihapus", "success");
                    fetchTransactions();
                } else {
                    notify("Gagal hapus", "error");
                }
                setLoading(false);
            }
        }

        function formatCurrency(v) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v); }
        function setLoading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }

        function exportToExcel() {
            const dataToExport = getFilteredData();
            if (dataToExport.length === 0) return notify("Data kosong", "warning");
            const formatted = dataToExport.map(t => ({
                'Tanggal': t.transaction_date,
                'Kategori': t.category,
                'Keterangan': t.description,
                'Tipe': t.type === 'income' ? 'Masuk' : 'Keluar',
                'Nominal': Number(t.amount)
            }));
            const ws = XLSX.utils.json_to_sheet(formatted);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `Laporan_Keuangan_Filtered_${new Date().getTime()}.xlsx`);
            notify("Excel berhasil diekspor");
        }

        function exportToWord() {
            const dataToExport = getFilteredData();
            if (dataToExport.length === 0) return notify("Data kosong", "warning");
            let h = `<h2 style="text-align:center">Laporan Keuangan</h2><table border="1" style="width:100%; border-collapse:collapse">`;
            h += `<tr style="background:#eee"><th>Tgl</th><th>Kategori</th><th>Keterangan</th><th>Tipe</th><th>Nominal</th></tr>`;
            dataToExport.forEach(t => h += `<tr><td>${t.transaction_date}</td><td>${t.category}</td><td>${t.description}</td><td>${t.type}</td><td align="right">${t.amount}</td></tr>`);
            h += `</table>`;
            saveAs(new Blob(['\ufeff', h], { type: 'application/msword' }), "Laporan_Filtered.doc");
            notify("Word berhasil diekspor");
        }

        document.getElementById('date').valueAsDate = new Date();
        fetchTransactions();
    </script>
</body>
</html>
