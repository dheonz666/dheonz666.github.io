<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link href="assets/img/scanner.png" rel="icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Opname - Sparepart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library Barcode -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- Library Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Library Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        .barcode-container svg {
            width: 100%;
            height: auto;
            max-height: 65px;
        }

        .loader {
            border-top-color: #4f46e5;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Excel-like Table Styling */
        .excel-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }
        .excel-table th {
            position: sticky;
            top: 0;
            background: #f8fafc;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }
        .excel-table th:hover {
            background-color: #f1f5f9;
        }

        @keyframes highlight-new {
            0% { background-color: #eef2ff; }
            100% { background-color: transparent; }
        }
        .new-entry {
            animation: highlight-new 2s ease-out;
        }

        /* SweetAlert-like Animations */
        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-animate { animation: modalShow 0.2s ease-out; }

        .modal-active { display: flex !important; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 z-[70] hidden flex flex-col items-center justify-center text-center px-4">
        <div class="loader w-12 h-12 border-4 border-slate-200 rounded-full mb-4"></div>
        <p id="loadingText" class="text-indigo-600 font-semibold animate-pulse">Memproses Data...</p>
    </div>

    <!-- Hidden File Input for Import -->
    <input type="file" id="importFileInput" accept=".xlsx, .xls" class="hidden" onchange="handleFileImport(event)">

    <!-- SweetAlert-like Delete Confirmation Modal -->
    <div id="confirmModal" class="fixed inset-0 bg-slate-900/60 z-[60] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-10 max-w-sm w-full shadow-2xl border border-slate-100 modal-animate text-center">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 mb-2">Apakah anda yakin?</h3>
            <p class="text-slate-500 mb-8 leading-relaxed">Data yang dihapus tidak dapat dikembalikan lagi!</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeConfirmModal()" class="px-6 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-all">Batal</button>
                <button id="btnConfirmDelete" class="px-6 py-3.5 bg-red-500 hover:bg-red-600 text-white font-bold rounded-2xl shadow-lg shadow-red-200 transition-all">Ya, Hapus!</button>
            </div>
        </div>
    </div>

    <!-- SweetAlert-like Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 z-[60] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-10 max-w-sm w-full shadow-2xl border border-slate-100 modal-animate">
            <div class="w-20 h-20 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 text-center mb-1">Edit Stok</h3>
            <p id="editItemCode" class="text-xs font-mono text-slate-400 text-center mb-8"></p>
            <input type="hidden" id="editItemId">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Jumlah Baru</label>
                    <input type="number" id="editQtyInput" class="w-full bg-slate-50 border-0 rounded-2xl p-4 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all outline-none mt-1 text-center text-xl font-bold">
                </div>
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="closeEditModal()" class="px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-all">Batal</button>
                    <button onclick="confirmEdit()" class="px-6 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 transition-all">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="mb-10 text-center">
            <div class="flex items-center justify-center gap-3 mb-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m-3 3h2m3-3h2M9 17h2m3 3h2M5 8v8a2 2 0 002 2h10a2 2 0 002-2V8a2 2 0 00-2-2H7a2 2 0 00-2 2z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 12h10" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12h1" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 12h1" />
                </svg>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">
                    <span class="text-indigo-600">Stock Opname Sparepart</span>
                </h1>
            </div>
            <div class="flex items-center justify-center gap-3">
                <div id="statusDot" class="h-2.5 w-2.5 rounded-full bg-slate-300"></div>
                <p id="statusText" class="text-sm font-medium text-slate-500 uppercase tracking-wider">Menghubungkan ke database...</p>
            </div>
        </header>

        <!-- Input Section -->
        <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 mb-10 border border-slate-100">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                <!-- Custom Searchable Area Select -->
                <div class="space-y-2 relative">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Area Sparepart</label>
                    <div id="customAreaSelect" class="relative group">
                        <button type="button" onclick="toggleAreaDropdown()" 
                            class="w-full bg-slate-50 border-0 rounded-2xl p-4 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all outline-none text-left flex justify-between items-center">
                            <span id="selectedAreaText" class="text-slate-700 font-medium">Pilih Area...</span>
                            <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        
                        <div id="areaDropdown" class="absolute left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border border-slate-100 z-50 hidden modal-animate overflow-hidden">
                            <div class="p-3 border-b border-slate-50 bg-slate-50/50">
                                <input type="text" id="areaSearchInput" oninput="filterAreaOptions()" placeholder="Cari area (misal: GS, A01)..." 
                                    class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </div>
                            <div id="areaOptionsList" class="max-h-64 overflow-y-auto custom-scrollbar">
                                <!-- Options will be generated by JS -->
                            </div>
                        </div>
                        <input type="hidden" id="areaInput" value="">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Kode Barcode</label>
                    <input type="text" id="barcodeInput" placeholder="Scan barcode..." 
                        class="w-full bg-slate-50 border-0 rounded-2xl p-4 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                        onkeypress="if(event.key === 'Enter') saveToCloud()">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Jumlah Item</label>
                    <input type="number" id="qtyInput" value="1" min="1" 
                        class="w-full bg-slate-50 border-0 rounded-2xl p-4 ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                </div>

                <button onclick="saveToCloud()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-lg shadow-indigo-200 active:scale-95">
                    Simpan Manual
                </button>
            </div>
        </div>

        <!-- Toolbar & Options -->
        <div class="flex flex-col space-y-6 mb-10">
            <div class="w-full flex flex-col md:flex-row md:items-center justify-between gap-2">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Daftar Inventaris Sparepart</h2>
                    <p id="viewStatusInfo" class="text-indigo-500 text-sm font-semibold italic">Menampilkan data bulan ini</p>
                </div>
                <div class="flex gap-2 self-start md:self-center">
                    <button onclick="document.getElementById('importFileInput').click()" class="bg-white hover:bg-slate-50 text-slate-700 px-4 py-1.5 rounded-full border border-slate-200 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                        Import Excel
                    </button>
                </div>
            </div>

            <div class="flex flex-col xl:flex-row justify-between items-center gap-6 bg-slate-100/50 p-4 rounded-2xl border border-slate-200/50">
                <div class="flex flex-wrap items-end gap-4 w-full xl:w-auto">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tampilan</label>
                        <div class="relative min-w-[125px]">
                            <select id="modeSelector" onchange="switchView(this.value)" class="w-full bg-white border border-slate-200 rounded-xl pl-3 pr-8 py-2 text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 appearance-none cursor-pointer h-[38px] shadow-sm">
                                <option value="grid">Mode Kartu</option>
                                <option value="table" selected>Mode Tabel</option>
                            </select>
                            <div class="absolute inset-y-0 right-2.5 flex items-center pointer-events-none">
                                <svg class="h-3.5 w-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1 w-full md:w-44 lg:w-56">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Cari Barcode / Area</label>
                        <div class="relative">
                            <input type="text" id="searchInput" oninput="renderUI()" placeholder="Cari..." 
                                class="w-full bg-white border border-slate-200 rounded-xl pl-9 pr-3 py-2 text-sm font-medium text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition-all h-[38px]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-2.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>

                    <div class="space-y-1 w-full md:w-36">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Filter Area</label>
                        <div class="relative">
                            <select id="viewFilter" onchange="renderUI()" class="w-full bg-white border border-slate-200 rounded-xl pl-4 pr-8 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition-all appearance-none cursor-pointer h-[38px]">
                                <option value="all">Semua Area</option>
                            </select>
                            <div class="absolute inset-y-0 right-2.5 flex items-center pointer-events-none">
                                <svg class="h-3.5 w-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1 w-full md:w-36">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Dari Tanggal</label>
                        <input type="date" id="startDate" onchange="renderUI()" class="w-full bg-white border border-slate-200 rounded-xl px-2 py-1.5 text-xs font-medium text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition-all h-[38px]">
                    </div>

                    <div class="space-y-1 w-full md:w-36">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Sampai Tanggal</label>
                        <input type="date" id="endDate" onchange="renderUI()" class="w-full bg-white border border-slate-200 rounded-xl px-2 py-1.5 text-xs font-medium text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition-all h-[38px]">
                    </div>

                    <div class="pb-0.5 flex gap-2">
                        <button onclick="resetFilters()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-xl font-bold text-xs transition-colors shadow-sm h-[38px]" title="Reset Semua Filter">
                            Reset
                        </button>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 w-full xl:w-auto justify-end items-end">
                    <button onclick="loadData()" class="bg-white hover:bg-slate-50 text-slate-700 px-3 py-2 rounded-xl transition-colors border border-slate-200 flex items-center justify-center h-[38px] shadow-sm" title="Refresh Data">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                    <button onclick="exportExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-sm transition-colors h-[38px]">Excel</button>
                    <button onclick="exportWord()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-sm transition-colors h-[38px]">Word</button>
                </div>
            </div>
        </div>

        <!-- Data Display Area -->
        <div id="stockContainer" class="space-y-10 pb-20">
            <div class="text-center py-24 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                <p class="text-slate-400">Memuat data...</p>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SB_URL = 'https://wqgqyrqjtazqkdellkbo.supabase.co'; 
        const SB_KEY = 'sb_publishable_y2KBNtIQG1e7TWrJbiQFJg_jjykI3bC'; 
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let inventoryData = {};
        let currentView = 'table';
        let sortConfig = { key: 'created_at', direction: 'desc' }; 
        let lastScannedId = null;

        // --- CUSTOM SELECT LOGIC ---
        const areaOptions = [];
        function initAreaDropdownData() {
            const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
            letters.forEach(letter => {
                for(let i=1; i<=40; i++) {
                    const areaNum = i < 10 ? '0' + i : i;
                    areaOptions.push({ value: `${letter}${areaNum}`, label: `${letter}${areaNum}`, group: `AREA ${letter}` });
                }
            });
            // GS Area
            areaOptions.push({ value: 'GS', label: 'GS', group: 'AREA GS' });
            for(let i=1; i<=91; i++) {
                const areaNum = i < 10 ? '0' + i : i;
                areaOptions.push({ value: `GS${areaNum}`, label: `GS${areaNum}`, group: 'AREA GS' });
            }
            renderAreaOptions();
        }

        function renderAreaOptions(filter = "") {
            const list = document.getElementById('areaOptionsList');
            const term = filter.toLowerCase();
            list.innerHTML = "";
            
            let currentGroup = "";
            areaOptions.forEach(opt => {
                if (opt.label.toLowerCase().includes(term) || opt.group.toLowerCase().includes(term)) {
                    if (opt.group !== currentGroup) {
                        currentGroup = opt.group;
                        const header = document.createElement('div');
                        header.className = "px-4 py-2 text-[10px] font-bold text-slate-400 bg-slate-50/50 uppercase tracking-widest sticky top-0";
                        header.innerText = currentGroup;
                        list.appendChild(header);
                    }
                    const item = document.createElement('div');
                    item.className = "px-4 py-3 text-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 cursor-pointer transition-colors border-l-4 border-transparent hover:border-indigo-500";
                    item.innerText = opt.label;
                    item.onclick = () => selectAreaOption(opt.value, opt.label);
                    list.appendChild(item);
                }
            });

            if (list.innerHTML === "") {
                list.innerHTML = `<div class="p-8 text-center text-slate-400 text-xs italic">Area tidak ditemukan</div>`;
            }
        }

        function toggleAreaDropdown() {
            const dropdown = document.getElementById('areaDropdown');
            const isHidden = dropdown.classList.contains('hidden');
            
            // Tutup dropdown lain jika ada (misal klik di luar)
            document.querySelectorAll('#areaDropdown').forEach(d => d.classList.add('hidden'));
            
            if (isHidden) {
                dropdown.classList.remove('hidden');
                document.getElementById('areaSearchInput').value = "";
                renderAreaOptions();
                setTimeout(() => document.getElementById('areaSearchInput').focus(), 100);
            }
        }

        function filterAreaOptions() {
            const val = document.getElementById('areaSearchInput').value;
            renderAreaOptions(val);
        }

        function selectAreaOption(val, label) {
            document.getElementById('areaInput').value = val;
            document.getElementById('selectedAreaText').innerText = label;
            document.getElementById('selectedAreaText').className = "text-indigo-600 font-bold";
            document.getElementById('areaDropdown').classList.add('hidden');
            document.getElementById('barcodeInput').focus();
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            const customSelect = document.getElementById('customAreaSelect');
            if (!customSelect.contains(e.target)) {
                document.getElementById('areaDropdown').classList.add('hidden');
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            initAreaDropdownData();
            // Set tanggal default ke hari ini
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
            document.getElementById('endDate').value = today;

            if (!SB_URL || !SB_KEY) {
                updateStatus('bg-red-500', 'API Belum Diatur');
                return;
            }
            await initConnection();
            document.getElementById('barcodeInput').focus();
        });

        async function initConnection() {
            try {
                updateStatus('bg-amber-500', 'Koneksi...');
                const { error } = await supabaseClient.from('sparepart').select('id').limit(1);
                if (error) throw error;
                
                updateStatus('bg-green-500', 'database Online');
                await loadData();
            } catch (err) {
                console.error("Connection error:", err);
                updateStatus('bg-red-500', 'Gagal Koneksi');
            }
        }

        function updateStatus(colorClass, text) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            if(dot && txt) {
                dot.className = `h-2.5 w-2.5 rounded-full ${colorClass}`;
                txt.innerText = text;
            }
        }

        function toggleLoading(show, text = "Memproses Data...") {
            const overlay = document.getElementById('loadingOverlay');
            const label = document.getElementById('loadingText');
            if (label) label.innerText = text;
            if (overlay) overlay.classList.toggle('hidden', !show);
        }

        function switchView(view) {
            currentView = view;
            renderUI();
        }

        function toggleSort(key) {
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }
            renderUI();
        }

        function resetFilters() {
            // Reset ke tanggal hari ini
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
            document.getElementById('endDate').value = today;
            document.getElementById('viewFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            renderUI();
        }

        async function loadData() {
            toggleLoading(true);
            try {
                const { data, error } = await supabaseClient
                    .from('sparepart')
                    .select('*');

                if (error) throw error;

                if (data) {
                    inventoryData = {};
                    data.forEach(item => {
                        if (!inventoryData[item.area]) inventoryData[item.area] = [];
                        inventoryData[item.area].push(item);
                    });
                    
                    updateFilterDropdown();
                    renderUI();
                    updateStatus('bg-green-500', 'Data Tersinkron');
                }
            } catch (e) {
                console.error("Load error:", e);
                updateStatus('bg-red-500', 'Gagal Memuat Data');
            } finally {
                toggleLoading(false);
            }
        }

        function updateFilterDropdown() {
            const filterSelect = document.getElementById('viewFilter');
            const currentValue = filterSelect.value;
            const areas = Object.keys(inventoryData).sort();
            
            let html = '<option value="all">Semua Area</option>';
            areas.forEach(area => {
                html += `<option value="${area}">${area.toUpperCase()}</option>`;
            });
            
            filterSelect.innerHTML = html;
            if (Array.from(filterSelect.options).some(o => o.value === currentValue)) {
                filterSelect.value = currentValue;
            }
        }

        async function saveToCloud() {
            let area = document.getElementById('areaInput').value;
            const barcodeInput = document.getElementById('barcodeInput');
            const barcode = barcodeInput.value.trim();
            const qtyInput = document.getElementById('qtyInput');
            const qty = parseInt(qtyInput.value) || 1;

            if (!area) {
                alert("Silahkan pilih area terlebih dahulu!");
                toggleAreaDropdown();
                return;
            }
            if (!barcode) return;

            toggleLoading(true, "Menyimpan...");
            updateStatus('bg-amber-500', 'Menyimpan...');

            try {
                const { data: existingData, error: checkError } = await supabaseClient
                    .from('sparepart')
                    .select('id, qty')
                    .eq('area', area)
                    .eq('barcode', barcode)
                    .maybeSingle();

                if (checkError) throw checkError;

                let result;
                if (existingData) {
                    const { data, error } = await supabaseClient
                        .from('sparepart')
                        .update({ qty: existingData.qty + qty })
                        .eq('id', existingData.id)
                        .select()
                        .single();
                    if (error) throw error;
                    result = data;
                } else {
                    const { data, error } = await supabaseClient
                        .from('sparepart')
                        .insert([{ area, barcode, qty }])
                        .select()
                        .single();
                    if (error) throw error;
                    result = data;
                }

                lastScannedId = result.id;
                sortConfig = { key: 'created_at', direction: 'desc' };
                
                barcodeInput.value = '';
                barcodeInput.focus();
                qtyInput.value = 1;
                
                await loadData();
                updateStatus('bg-green-500', 'Berhasil Disimpan');
            } catch (err) {
                console.error("Save error:", err);
                updateStatus('bg-red-500', 'Error: Cek Akses DB');
            } finally {
                toggleLoading(false);
            }
        }

        async function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            toggleLoading(true, "Membaca File Excel...");
            const reader = new FileReader();
            
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    if (jsonData.length === 0) {
                        alert("File kosong!");
                        toggleLoading(false);
                        return;
                    }

                    toggleLoading(true, `Mengimport ${jsonData.length} baris...`);
                    
                    for (let i = 0; i < jsonData.length; i++) {
                        const row = jsonData[i];
                        const area = (row.Area || row.area || "").toString().trim().toUpperCase();
                        const barcode = (row.Barcode || row.barcode || "").toString().trim();
                        const qty = parseInt(row.Qty || row.qty || row.Jumlah || 0);

                        if (area && barcode && qty > 0) {
                            const { data: existing } = await supabaseClient
                                .from('sparepart')
                                .select('id, qty')
                                .eq('area', area)
                                .eq('barcode', barcode)
                                .maybeSingle();

                            if (existing) {
                                await supabaseClient
                                    .from('sparepart')
                                    .update({ qty: existing.qty + qty })
                                    .eq('id', existing.id);
                            } else {
                                await supabaseClient
                                    .from('sparepart')
                                    .insert([{ area, barcode, qty }]);
                            }
                        }
                    }

                    event.target.value = "";
                    await loadData();
                    updateStatus('bg-green-500', 'Import Selesai');
                } catch (err) {
                    console.error("Import error:", err);
                    updateStatus('bg-red-500', 'Gagal Import');
                    alert("Gagal memproses file. Pastikan format kolom benar (Area, Barcode, Qty).");
                } finally {
                    toggleLoading(false);
                }
            };

            reader.readAsArrayBuffer(file);
        }

        function openEditModal(id, currentQty, barcode) {
            document.getElementById('editItemId').value = id;
            document.getElementById('editQtyInput').value = currentQty;
            document.getElementById('editItemCode').innerText = "Barcode: " + barcode;
            document.getElementById('editModal').classList.add('modal-active');
            setTimeout(() => document.getElementById('editQtyInput').select(), 100);
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('modal-active');
        }

        async function confirmEdit() {
            const id = document.getElementById('editItemId').value;
            const newQty = parseInt(document.getElementById('editQtyInput').value);
            
            if (isNaN(newQty) || newQty < 1) return;

            toggleLoading(true, "Memperbarui Stok...");
            closeEditModal();

            try {
                const { error } = await supabaseClient
                    .from('sparepart')
                    .update({ qty: newQty })
                    .eq('id', id);

                if (error) throw error;
                await loadData();
                updateStatus('bg-green-500', 'Stok Diperbarui');
            } catch (err) {
                console.error("Edit error:", err);
                updateStatus('bg-red-500', 'Gagal Memperbarui');
            } finally {
                toggleLoading(false);
            }
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('modal-active');
        }

        function deleteItem(id) {
            const modal = document.getElementById('confirmModal');
            const btnDelete = document.getElementById('btnConfirmDelete');
            
            modal.classList.add('modal-active');
            
            btnDelete.onclick = async function() {
                modal.classList.remove('modal-active');
                toggleLoading(true, "Menghapus...");
                try {
                    const { error } = await supabaseClient
                        .from('sparepart')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;
                    await loadData();
                    updateStatus('bg-red-500', 'Item Dihapus');
                } catch (err) {
                    console.error("Delete error:", err);
                    updateStatus('bg-red-500', 'Gagal Menghapus');
                } finally {
                    toggleLoading(false);
                }
            };
        }

        function parseLocalDate(dateStr, isEnd = false) {
            if (!dateStr) return null;
            const [y, m, d] = dateStr.split('-').map(Number);
            const date = new Date(y, m - 1, d);
            if (isEnd) {
                date.setHours(23, 59, 59, 999);
            } else {
                date.setHours(0, 0, 0, 0);
            }
            return date.getTime();
        }

        function getFilteredAndSortedData() {
            const filterArea = document.getElementById('viewFilter').value;
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const statusInfo = document.getElementById('viewStatusInfo');
            
            const startTime = parseLocalDate(startVal, false);
            const endTime = parseLocalDate(endVal, true);

            // Jika ada nilai di input tanggal, kita tampilkan info filter aktif
            if (startVal || endVal) {
                statusInfo.innerText = `Menampilkan data dari ${startVal || '...'} s/d ${endVal || '...'}`;
                statusInfo.classList.replace('text-indigo-500', 'text-emerald-500');
            } else {
                statusInfo.innerText = "Menampilkan data bulan ini";
                statusInfo.classList.replace('text-emerald-500', 'text-indigo-500');
            }

            let flatData = [];

            Object.keys(inventoryData).forEach(area => {
                if (filterArea === 'all' || area === filterArea) {
                    inventoryData[area].forEach(item => {
                        const dateObj = new Date(item.created_at);
                        const itemTime = dateObj.getTime();
                        let passDate = true;
                        let passSearch = true;
                        
                        // Gunakan filter tanggal jika diisi, jika tidak hanya tampilkan bulan ini
                        if (startVal || endVal) {
                            if (startTime && itemTime < startTime) passDate = false;
                            if (endTime && itemTime > endTime) passDate = false;
                        } else {
                            const now = new Date();
                            if (dateObj.getMonth() !== now.getMonth() || dateObj.getFullYear() !== now.getFullYear()) {
                                passDate = false;
                            }
                        }

                        if (searchKeyword) {
                            const barcodeMatch = item.barcode.toLowerCase().includes(searchKeyword);
                            const areaMatch = item.area.toLowerCase().includes(searchKeyword);
                            if (!barcodeMatch && !areaMatch) passSearch = false;
                        }

                        if (passDate && passSearch) {
                            flatData.push(item);
                        }
                    });
                }
            });

            flatData.sort((a, b) => {
                let valA = a[sortConfig.key];
                let valB = b[sortConfig.key];
                if (sortConfig.key === 'created_at') {
                    valA = new Date(valA).getTime();
                    valB = new Date(valB).getTime();
                } else if (typeof valA === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                }
                if (valA === undefined || valA === null) return 1;
                if (valB === undefined || valB === null) return -1;
                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            return flatData;
        }

        function renderUI() {
            const container = document.getElementById('stockContainer');
            const dataToRender = getFilteredAndSortedData();

            if (dataToRender.length === 0) {
                container.innerHTML = `<div class="text-center py-24 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                    <p class="text-slate-500 font-medium">Data tidak ditemukan.</p>
                    <p class="text-slate-400 text-xs mt-1">Gunakan filter tanggal untuk melihat data di luar rentang ini.</p>
                </div>`;
                return;
            }

            container.innerHTML = "";
            if (currentView === 'grid') {
                renderGridView(container, dataToRender);
            } else {
                renderTableView(container, dataToRender);
            }
        }

        function renderGridView(container, flatData) {
            const grouped = {};
            flatData.forEach(item => {
                if(!grouped[item.area]) grouped[item.area] = [];
                grouped[item.area].push(item);
            });

            Object.keys(grouped).sort().forEach(area => {
                const section = document.createElement('div');
                section.className = "bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-8";
                
                let html = `
                    <div class="bg-slate-50 border-b border-slate-100 px-8 py-5 flex justify-between items-center">
                        <h3 class="text-xl font-extrabold text-slate-900 tracking-tight underline decoration-indigo-500 decoration-4 underline-offset-8">${area.toUpperCase()}</h3>
                        <div class="bg-white px-4 py-1.5 rounded-full border border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-widest">
                            ${grouped[area].length} Item
                        </div>
                    </div>
                    <div class="p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                `;

                grouped[area].forEach(item => {
                    const isNew = item.id === lastScannedId ? 'ring-2 ring-indigo-500 bg-indigo-50/30' : '';
                    html += `
                        <div class="barcode-card group relative bg-white border border-slate-200 rounded-2xl p-5 hover:border-indigo-300 transition-all ${isNew}">
                            <div class="barcode-container mb-4">
                                <svg id="bc-${item.id}"></svg>
                            </div>
                            <div class="text-center pt-3 border-t border-slate-50">
                                <span class="block text-[10px] font-black text-slate-400 uppercase tracking-tighter mb-1">${item.barcode}</span>
                                <div class="text-2xl font-black text-slate-800">QTY: ${item.qty}</div>
                                <div class="text-[9px] text-slate-400 mt-1">${new Date(item.created_at).toLocaleString('id-ID')}</div>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                section.innerHTML = html;
                container.appendChild(section);

                grouped[area].forEach(item => {
                    JsBarcode(`#bc-${item.id}`, item.barcode, {
                        format: "CODE128", width: 1.8, height: 45, displayValue: false, margin: 0
                    });
                });
            });
        }

        function renderTableView(container, flatData) {
            const wrapper = document.createElement('div');
            wrapper.className = "bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden";
            
            let html = `
                <div class="overflow-x-auto">
                    <table class="excel-table min-w-full text-left table-auto">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th onclick="toggleSort('area')" class="px-6 py-4 text-xs font-bold text-slate-500 uppercase whitespace-nowrap w-24">
                                    <div class="flex items-center gap-2">Area ${getSortIcon('area')}</div>
                                </th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase whitespace-nowrap w-40 text-center">Barcode (Visual)</th>
                                <th onclick="toggleSort('barcode')" class="px-6 py-4 text-xs font-bold text-slate-500 uppercase whitespace-nowrap">
                                    <div class="flex items-center gap-2">Kode Barcode ${getSortIcon('barcode')}</div>
                                </th>
                                <th onclick="toggleSort('qty')" class="px-6 py-4 text-xs font-bold text-slate-500 uppercase whitespace-nowrap w-24">
                                    <div class="flex items-center gap-2">Qty ${getSortIcon('qty')}</div>
                                </th>
                                <th onclick="toggleSort('created_at')" class="px-6 py-4 text-xs font-bold text-slate-500 uppercase whitespace-nowrap w-40">
                                    <div class="flex items-center gap-2">Waktu Input ${getSortIcon('created_at')}</div>
                                </th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase whitespace-nowrap w-32 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
            `;

            flatData.forEach(item => {
                const isNew = item.id === lastScannedId ? 'new-entry' : '';
                const timeString = new Date(item.created_at).toLocaleString('id-ID', {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });

                html += `
                    <tr class="hover:bg-slate-50/50 transition-colors ${isNew}">
                        <td class="px-6 py-4 text-sm font-semibold text-slate-700">${item.area.toUpperCase()}</td>
                        <td class="px-6 py-4 text-center">
                            <div class="w-full flex justify-center">
                                <svg id="bt-${item.id}" class="max-w-[140px] h-auto"></svg>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm font-mono text-slate-600">${item.barcode}</td>
                        <td class="px-6 py-4">
                            <span class="text-lg font-bold text-slate-900">${item.qty}</span>
                        </td>
                        <td class="px-6 py-4 text-[11px] text-slate-400 font-medium">
                            ${timeString}
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex justify-center gap-2">
                                <button onclick="openEditModal('${item.id}', ${item.qty}, '${item.barcode}')" class="p-2.5 hover:bg-indigo-50 text-indigo-600 rounded-xl transition-all border border-indigo-100 shadow-sm active:scale-95" title="Edit Qty">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                </button>
                                <button onclick="deleteItem('${item.id}')" class="p-2.5 hover:bg-red-50 text-red-600 rounded-xl transition-all border border-red-100 shadow-sm active:scale-95" title="Hapus Item">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            wrapper.innerHTML = html;
            container.appendChild(wrapper);

            flatData.forEach(item => {
                JsBarcode(`#bt-${item.id}`, item.barcode, {
                    format: "CODE128", width: 1.5, height: 35, displayValue: false, margin: 0
                });
            });
        }

        function getSortIcon(key) {
            if (sortConfig.key !== key) return `<svg class="w-3 h-3 text-slate-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3.25a.75.75 0 01.75.75v14.19l3.72-3.72a.75.75 0 111.06 1.06l-5 5a.75.75 0 01-1.06 0l-5-5a.75.75 0 111.06-1.06l3.72 3.72V4a.75.75 0 01.75-.75z"/></svg>`;
            return sortConfig.direction === 'asc' 
                ? `<svg class="w-3 h-3 text-indigo-600" fill="currentColor" viewBox="0 0 24 24"><path d="M11.47 3.82a.75.75 0 011.06 0l5 5a.75.75 0 01-1.06 1.06L12.75 6.16V20a.75.75 0 01-1.5 0V6.16L7.53 9.88a.75.75 0 01-1.06-1.06l5-5z"/></svg>`
                : `<svg class="w-3 h-3 text-indigo-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3.25a.75.75 0 01.75.75v14.19l3.72-3.72a.75.75 0 111.06 1.06l-5 5a.75.75 0 01-1.06 0l-5-5a.75.75 0 111.06-1.06l3.72 3.72V4a.75.75 0 01.75-.75z"/></svg>`;
        }

        function exportExcel() {
            const dataToExport = getFilteredAndSortedData();
            if (dataToExport.length === 0) return;
            const flatData = dataToExport.map(item => ({
                "Area": item.area.toUpperCase(), 
                "Barcode": item.barcode, 
                "Jumlah (Qty)": item.qty, 
                "Waktu Input": new Date(item.created_at).toLocaleString('id-ID') 
            }));
            const ws = XLSX.utils.json_to_sheet(flatData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_Sparepart_Export_${new Date().getTime()}.xlsx`);
        }

        function exportWord() {
            const dataToExport = getFilteredAndSortedData();
            if (dataToExport.length === 0) return;
            let docHeader = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'><title>Laporan</title><style>
            table { border-collapse: collapse; width: 100%; } th, td { border: 1px solid black; padding: 8px; text-align: left; font-family: sans-serif; font-size: 12px; }
            th { background-color: #f3f4f6; } h1 { color: #4f46e5; text-align: center; font-size: 18px; }
            </style></head><body><h1>LAPORAN STOCK OPNAME SPAREPART</h1>
            <div style="font-size: 10px; color: #666;">Dicetak pada: ${new Date().toLocaleString('id-ID')}</div>`;
            let body = "<table><thead><tr><th>Area</th><th>Barcode</th><th>Jumlah</th><th>Waktu Input</th></tr></thead><tbody>";
            dataToExport.forEach(item => {
                body += `<tr><td>${item.area.toUpperCase()}</td><td>${item.barcode}</td><td>${item.qty}</td><td>${new Date(item.created_at).toLocaleString('id-ID')}</td></tr>`;
            });
            body += `</tbody></table></body></html>`;
            const fullContent = docHeader + body;
            const blob = new Blob(['\ufeff', fullContent], { type: 'application/msword' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Laporan_Sparepart_Export.doc";
            link.click();
        }
    </script>
